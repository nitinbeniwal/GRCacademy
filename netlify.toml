[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — let React Router handle all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ---------------------------------------------------------------------------
# Security headers. CSP allowlists exactly the third parties we use:
# Clerk (auth), Supabase (data/functions), Razorpay (checkout), Google Fonts.
# If you move Clerk to a custom domain, add it to script-src/connect-src.
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://challenges.cloudflare.com https://*.clerk.accounts.dev https://*.clerk.com https://clerk.grcacademy.in; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.stripe.com https://challenges.cloudflare.com https://*.clerk.accounts.dev https://*.clerk.com https://clerk.grcacademy.in; frame-src https://js.stripe.com https://checkout.stripe.com https://challenges.cloudflare.com https://*.clerk.accounts.dev https://*.clerk.com https://clerk.grcacademy.in https://accounts.grcacademy.in; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'"
