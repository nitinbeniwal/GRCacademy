ROOMS.push(
{
 id:"risk-methods", path:"p1", ic:"📐", diff:"med", title:"Risk Methodologies & Governance Structures",
 sub:"The standards behind risk work, and the structures that assign accountability.",
 tasks:[
  {title:"Risk standards: ISO 31000, 27005, FAIR",
   info:`<p>Beyond likelihood×impact, you must know the standards a senior role is expected to cite:</p>
   <table><tr><th>Standard</th><th>Purpose</th></tr>
   <tr><td><b>ISO 31000</b></td><td>The umbrella <b>enterprise</b> risk-management standard — principles, framework, process. Applies to any risk, not just IT.</td></tr>
   <tr><td><b>ISO 27005</b></td><td><b>Information-security</b> risk management — the infosec-specific companion to 27001.</td></tr>
   <tr><td><b>FAIR</b></td><td><b>Quantitative</b> cyber-risk model — expresses risk in <b>financial terms ($)</b>, not just High/Med/Low.</td></tr></table>
   <h4>Qualitative vs quantitative</h4>
   <p><b>Qualitative</b> = ratings/heat maps (fast, subjective). <b>Quantitative</b> = numbers/money
   (FAIR; rigorous, data-hungry). Mature programs blend both — qualitative to triage, quantitative
   for the big decisions.</p>
   <div class="callout why"><b>Why FAIR matters at senior level:</b> boards think in dollars. Saying
   "this risk is ~$4M annualised loss" lands far harder than "it's red on the heat map".</div>`,
   qs:[
    {q:"Which model expresses cyber risk in financial/dollar terms (quantitative)?",a:["fair"],
     explain:"FAIR — Factor Analysis of Information Risk; quantifies risk in money."},
    {q:"Which ISO standard is specifically for INFORMATION SECURITY risk management?",a:["iso 27005","27005","iso/iec 27005"],
     explain:"ISO 27005 — infosec risk management, companion to 27001 (31000 is the enterprise umbrella)."},
    {q:"A colour-coded grid of risks by likelihood and impact is called a risk ___ map.",a:["heat","heatmap","heat map"],
     explain:"Heat map — the classic qualitative visualisation for the board."},
   ]},
  {title:"RACI, Segregation of Duties & who owns what",
   info:`<p>Senior GRC answers three questions constantly: <b>who owns the control, who approves the
   policy, who accepts the risk?</b> The structures below give the answers.</p>
   <h4>RACI matrix</h4>
   <p>Defines roles per task: <b>R</b>esponsible (does it), <b>A</b>ccountable (owns the outcome —
   <em>exactly one</em> per task), <b>C</b>onsulted, <b>I</b>nformed. The "one Accountable" rule
   prevents diffusion of responsibility.</p>
   <h4>Segregation of Duties (SoD)</h4>
   <p>No single person should control a whole risky process end-to-end (e.g. the person who creates a
   payment can't also approve it). SoD prevents fraud and error.</p>
   <h4>Who accepts risk?</h4>
   <p>The <b>risk owner</b> (a business leader) formally accepts residual risk — <em>never</em> the
   auditor or the GRC analyst. GRC advises; the business owns and accepts.</p>
   <div class="callout why"><b>Cause:</b> if the auditor "accepted" the risk, independence is gone and
   nobody in the business is accountable. Ownership must sit with the business.</div>`,
   qs:[
    {q:"In a RACI matrix, how many people should be ACCOUNTABLE for a single task? (number/word)",a:["one","1"],
     explain:"Exactly one Accountable per task — prevents diffusion of responsibility."},
    {q:"The control that stops one person controlling a whole risky process (e.g. create + approve a payment) is Segregation of ___",a:["duties","duty"],
     explain:"Segregation of Duties (SoD) — splits a risky process to prevent fraud/error."},
    {q:"Who formally ACCEPTS a residual risk — the risk owner (business), or internal audit?",a:["risk owner","the risk owner","business","risk owner (business)"],
     explain:"The risk owner in the business accepts risk. Audit/GRC advise but never accept — that would break independence."},
   ]},
 ]},
{
 id:"more-frameworks", path:"p2", ic:"🗂️", diff:"hard", title:"More Frameworks: PCI, HIPAA, SOX, CIS, COBIT",

   info:`<p>Know what each protects and who it binds — interviewers test rapid placement:</p>
   <table><tr><th>Framework</th><th>Protects</th><th>Who must comply</th></tr>
   <tr><td><b>PCI DSS</b></td><td><b>Cardholder/payment data</b></td><td>Anyone who stores, processes or transmits card data (mandated by card brands, not a law)</td></tr>
   <tr><td><b>HIPAA</b></td><td><b>PHI</b> (Protected Health Information)</td><td>US healthcare "covered entities" + their business associates</td></tr>
   <tr><td><b>SOX</b></td><td>Accuracy of <b>financial reporting</b></td><td>US public companies (focus: internal controls over financial reporting, §404)</td></tr></table>
   <div class="callout why"><b>Cause to remember:</b> PCI DSS is a <em>contractual</em> standard from
   Visa/Mastercard etc., while HIPAA and SOX are <em>laws</em>. Different enforcement, same rigour.</div>`,
   qs:[
    {q:"PCI DSS exists to protect ___ data (the card numbers).",a:["cardholder","payment card","card","cardholder data","payment"],

    {q:"HIPAA protects health data known as ___ (abbrev).",a:["phi","protected health information"],
     explain:"PHI — Protected Health Information; HIPAA has a Privacy Rule and a Security Rule."},
    {q:"SOX is concerned with the accuracy of ___ reporting.",a:["financial"],
     explain:"Financial reporting — SOX §404 mandates internal controls over financial reporting (ICFR)."},
   ]},
  {title:"Best-practice frameworks: CIS Controls, COBIT, FedRAMP",
   info:`<p>Not laws — voluntary frameworks you'll map against:</p>
   <ul><li><b>CIS Controls v8</b> — 18 prioritised security safeguards, organised into <b>3
   Implementation Groups (IG1–IG3)</b> by org size/maturity. Great as a practical starting baseline.</li>
   <li><b>COBIT</b> — ISACA's <b>IT governance</b> framework; aligns IT with business goals (the
   governance counterpart to operational security frameworks).</li>
   <li><b>FedRAMP</b> — standardised security authorisation for <b>cloud services sold to the US
   government</b> (built on NIST 800-53).</li></ul>
   <div class="callout why"><b>The meta-skill:</b> you'll rarely use just one. The senior skill is

   qs:[
    {q:"CIS Controls v8 groups its safeguards into how many Implementation Groups? (number)",a:["3","three","ig1-3","ig1-ig3"],
     explain:"3 Implementation Groups (IG1–IG3), scaled by organisation size and maturity."},
    {q:"ISACA's IT GOVERNANCE framework (aligns IT to business goals) is called ___",a:["cobit"],
     explain:"COBIT — the IT governance framework from ISACA."},
    {q:"The US program authorising cloud services for government use (built on NIST 800-53) is ___",a:["fedramp"],

/* ============================== PATH 6 (shown as Path 2): SECURITY & TECHNICAL ============================== */
ROOMS.push(
{
 id:"security-fundamentals", path:"p6", ic:"🔒", diff:"easy", title:"Security Fundamentals for GRC",
 sub:"Enough security to credibly assess controls — the core models.",
 tasks:[
  {title:"The CIA triad & AAA",
   info:`<p>Every security control ultimately protects one of three properties — the <b>CIA triad</b>:</p>
   <ul><li><b>Confidentiality</b> — only authorised people can see data (encryption, access control)</li>
   <li><b>Integrity</b> — data isn't tampered with (hashing, change control)</li>
   <li><b>Availability</b> — systems/data are there when needed (backups, redundancy, DDoS defence)</li></ul>
   <p><b>AAA</b> underpins access: <b>Authentication</b> (who are you?), <b>Authorization</b> (what
   can you do?), <b>Accounting/Audit</b> (what did you do?).</p>
   <div class="callout why"><b>Why GRC cares:</b> when you assess a control, you should be able to say
   <em>which</em> CIA property it protects. Encryption → confidentiality; backups → availability;
   hashing → integrity. That framing is the language of risk.</div>`,
   qs:[
    {q:"The three security properties (the triad) are Confidentiality, Integrity and ___",a:["availability"],
     explain:"Confidentiality, Integrity, Availability — the CIA triad."},
    {q:"Ransomware that encrypts your files and blocks access attacks which CIA property most directly?",a:["availability"],
     explain:"Availability — you can't access your data/systems. (It can hit confidentiality too if data is stolen.)"},
    {q:"In AAA, proving WHO you are is ___ (the first A).",a:["authentication","authn"],
     explain:"Authentication = identity; Authorization = permissions; Accounting = audit trail."},
   ]},
  {title:"Zero Trust, Defense in Depth, Least Privilege",
   info:`<p>Three architectural principles you'll see in every modern control set:</p>
   <ul><li><b>Zero Trust</b> — "never trust, always verify". No implicit trust from being inside the
   network; every request is authenticated, authorised and continuously validated.</li>
   <li><b>Defense in Depth</b> — layered controls, so one failure isn't fatal (firewall + MFA +
   EDR + monitoring). Like an onion.</li>
   <li><b>Least Privilege</b> — users/systems get the minimum access needed, nothing more.</li></ul>
   <p>Supporting tech to recognise: <b>encryption at rest & in transit</b>, and <b>PKI</b>
   (public-key infrastructure — certificates that enable trust/encryption like HTTPS).</p>
   <div class="callout why"><b>Cause:</b> the old "castle and moat" model failed because once inside,
   attackers roamed freely. Zero Trust removes the assumption that "inside = safe".</div>`,
   qs:[
    {q:"The model 'never trust, always verify — no implicit trust by network location' is called ___ ___",a:["zero trust"],
     explain:"Zero Trust — verify every request regardless of where it originates."},
    {q:"Layering multiple independent controls so one failure isn't catastrophic is Defense in ___",a:["depth"],
     explain:"Defense in Depth — redundant layers, like an onion."},
    {q:"Giving a user only the minimum access required is the principle of least ___",a:["privilege"],
     explain:"Least Privilege — minimise access to limit blast radius."},
   ]},
 ]},
{
 id:"iam", path:"p6", ic:"🪪", diff:"med", title:"Identity & Access Management",
 sub:"Who can access what — the most-tested control area in any audit.",
 tasks:[
  {title:"Access models & the identity lifecycle",
   info:`<p>IAM controls dominate audits because most breaches involve identity. Core models:</p>
   <ul><li><b>RBAC</b> (Role-Based) — access granted by <b>job role</b> (e.g. "Nurse" role). Simple, common.</li>
   <li><b>ABAC</b> (Attribute-Based) — access by <b>attributes/policies</b> (department + location +
   time). More granular, more complex.</li></ul>
   <h4>Joiner / Mover / Leaver (JML)</h4>
   <p>The identity lifecycle: <b>Joiner</b> (provision access), <b>Mover</b> (adjust when role
   changes — watch for <em>privilege creep</em>), <b>Leaver</b> (revoke promptly). Stale leaver
   accounts are a classic audit finding.</p>
   <h4>Access reviews</h4>
   <p><b>Access recertification</b> = periodic confirmation that users still need their access.
   Required by SOC 2, ISO 27001, SOX.</p>`,
   qs:[
    {q:"Access granted according to a user's job role is which model? (abbrev)",a:["rbac","role-based access control","role based access control"],
     explain:"RBAC — Role-Based Access Control; ABAC uses attributes/policies instead."},
    {q:"In the JML lifecycle, promptly removing access when staff depart is the ___ stage.",a:["leaver","leavers"],
     explain:"Leaver — failing here leaves orphaned accounts, a classic finding."},
    {q:"The periodic check that users still need their access is called access ___ (review/recertification).",a:["review","recertification","reviews","certification"],
     explain:"Access review/recertification — required by SOC 2, ISO 27001, SOX."},
   ]},
  {title:"MFA, SSO, PAM & privileged access",
   info:`<p>Key IAM controls you'll assess:</p>
   <ul><li><b>MFA</b> (Multi-Factor Auth) — requires 2+ factors (something you know/have/are).
   The single highest-impact control against account takeover.</li>
   <li><b>SSO</b> (Single Sign-On) — one login for many apps; improves UX and centralises control.</li>
   <li><b>PAM</b> (Privileged Access Management) — vaults and monitors admin/privileged accounts
   (just-in-time access, session recording). Admins are the crown-jewel targets.</li>
   <li><b>Conditional access</b> — context-aware rules (block login from a risky country/device).</li>
   <li><b>Service accounts</b> — non-human identities; often over-privileged and unmonitored, a
   growing risk.</li></ul>
   <div class="callout why"><b>Cause:</b> privileged accounts are governed separately (PAM) because
   one compromised admin = full breach. The blast radius justifies the extra control.</div>`,
   qs:[
    {q:"Requiring a second factor beyond a password is abbreviated ___",a:["mfa","2fa","multi-factor authentication","multifactor authentication"],
     explain:"MFA — the highest-impact control against account takeover."},
    {q:"Vaulting, monitoring and time-limiting admin/privileged accounts is abbreviated ___",a:["pam","privileged access management"],
     explain:"PAM — Privileged Access Management; admins are the crown-jewel targets."},
   ]},
 ]},
{
 id:"secops", path:"p6", ic:"🛰️", diff:"med", title:"Security Operations & Incident Response",
 sub:"How operational teams detect and respond — so you can assess them.",
 tasks:[
  {title:"The SOC, SIEM and detection stack",
   info:`<p>A senior GRC pro must understand how operational security runs:</p>
   <ul><li><b>SOC</b> (Security Operations Center) — the team that monitors and responds to threats,
   often 24/7.</li>
   <li><b>SIEM</b> (Security Information & Event Management) — aggregates and <b>correlates logs</b>
   from across the estate to detect threats (e.g. Splunk, Sentinel, QRadar).</li>
   <li><b>EDR/XDR</b> — Endpoint/Extended Detection & Response; watches devices for malicious behaviour.</li>
   <li><b>Threat Intelligence</b> — knowledge of attacker tactics to inform defence.</li>
   <li><b>Vulnerability Management</b> — scan, prioritise and remediate weaknesses; <b>patch
   management</b> is the fix pipeline.</li></ul>
   <div class="callout why"><b>Why logging matters to GRC:</b> "Accounting" in AAA + audit evidence
   both depend on logs. No logs → no detection and no audit trail. It's a top control to verify.</div>`,
   qs:[
    {q:"The tool that aggregates and correlates logs across systems to detect threats is a ___",a:["siem"],
     explain:"SIEM — Security Information & Event Management (Splunk, Sentinel, QRadar)."},
    {q:"The team (often 24/7) that monitors and responds to security threats is the ___",a:["soc","security operations center","security operations centre"],
     explain:"SOC — Security Operations Center."},
   ]},
  {title:"Incident response lifecycle & change management",
   info:`<p>The <b>NIST incident-response lifecycle</b> (memorise the phases):</p>
   <ol><li><b>Preparation</b> — plans, tools, training</li>
   <li><b>Detection & Analysis</b> — identify and scope</li>
   <li><b>Containment, Eradication & Recovery</b> — stop, remove, restore</li>
   <li><b>Post-Incident Activity</b> — lessons learned, improve</li></ol>
   <p><b>Change Management</b> controls modifications to production (request → assess → approve →
   implement → review) so changes don't cause outages or open security holes. Unauthorised change is
   a leading cause of both downtime and breaches.</p>
   <div class="callout why"><b>Note vs AI incident lab:</b> the AI incident room used contain→notify→
   RCA→CAPA — the same DNA. Containment first; learn last.</div>`,
   qs:[
    {q:"In the NIST IR lifecycle, the final phase that captures lessons learned is the ___ activity phase.",a:["post-incident","post incident","postincident","lessons learned"],
     explain:"Post-Incident Activity — feed lessons back into preparation."},
    {q:"The process that controls modifications to production to prevent outages/security holes is ___ management.",a:["change"],
     explain:"Change Management — request, assess, approve, implement, review."},
   ]},
 ]},
{
 id:"cloud-gov", path:"p6", ic:"☁️", diff:"med", title:"Cloud Governance",
 sub:"Assessing AWS/Azure/GCP without being a cloud engineer.",
 tasks:[
  {title:"The Shared Responsibility Model",
   info:`<p>The single most important cloud governance concept. Security is <b>split</b> between
   provider and customer:</p>
   <ul><li><b>Provider</b> secures <em>OF</em> the cloud — physical data centres, hardware, the core
   infrastructure.</li>
   <li><b>Customer</b> secures <em>IN</em> the cloud — your data, configuration, identities, access.</li></ul>
   <p>The split <b>shifts by service model</b>: in <b>IaaS</b> the customer patches the guest OS; in
   <b>SaaS</b> the provider handles almost everything except your data and access settings.</p>
   <div class="callout why"><b>Cause of most cloud breaches:</b> customers assume "the cloud is

  {title:"Cloud controls & CSPM",
   info:`<p>What "secure configuration" looks like — the things you check in a cloud review:</p>

{
 id:"bcp-dr", path:"p6", ic:"♻️", diff:"med", title:"Business Continuity & Disaster Recovery",
 sub:"Keeping the business running — the availability side of risk.",
 tasks:[
  {title:"BIA, RTO and RPO",
   info:`<p>Continuity planning starts with the <b>Business Impact Analysis (BIA)</b>: identify
   critical processes and how badly a disruption hurts over time. The BIA drives two key targets:</p>
   <table><tr><th>Metric</th><th>Question</th><th>Example</th></tr>
   <tr><td><b>RTO</b> (Recovery Time Objective)</td><td>How <em>fast</em> must we restore the service?</td><td>"Back up within 4 hours"</td></tr>
   <tr><td><b>RPO</b> (Recovery Point Objective)</td><td>How much <em>data loss</em> (in time) is acceptable?</td><td>"No more than 1 hour of data"</td></tr></table>
   <p>RPO drives <b>backup frequency</b> (1-hour RPO → at least hourly backups). RTO drives recovery
   <b>investment</b> (hot standby vs restore-from-tape).</p>
   <div class="callout why"><b>Trap:</b> people confuse RTO and RPO. RTO = <em>time to recover</em>;
   RPO = <em>data you can lose</em>. Both come from the BIA.</div>`,
   qs:[
    {q:"The maximum acceptable amount of DATA LOSS (measured in time) is the ___ (abbrev).",a:["rpo","recovery point objective"],
     explain:"RPO — Recovery Point Objective; drives backup frequency."},
    {q:"The target TIME to restore a service after disruption is the ___ (abbrev).",a:["rto","recovery time objective"],
     explain:"RTO — Recovery Time Objective; drives recovery investment."},
    {q:"The analysis that identifies critical processes and disruption impact is the ___ (abbrev).",a:["bia","business impact analysis"],
     explain:"BIA — Business Impact Analysis; the foundation of continuity planning."},
   ]},
  {title:"DR, backups, testing & ISO 22301",
   info:`<p><b>Disaster Recovery (DR)</b> is the IT subset of continuity — restoring systems/data
   after a major outage. Good practice:</p>
   <ul><li><b>3-2-1 backup rule</b> — 3 copies, on 2 media types, 1 offsite/offline.</li>
   <li><b>DR site strategies</b> — hot (instant), warm, cold (cheap, slow).</li>
   <li><b>Testing</b> — a plan never tested is a plan that fails. <b>Tabletop exercises</b> are
   discussion-based walkthroughs (no real systems); full tests actually fail over.</li></ul>
   <p><b>ISO 22301</b> is the international standard for a <b>Business Continuity Management System
   (BCMS)</b> — the continuity analogue of ISO 27001.</p>
   <div class="callout why"><b>Cause:</b> untested plans give false assurance. Auditors specifically
   ask "when did you last test, and what failed?"</div>`,
   qs:[
    {q:"The ISO standard for Business Continuity Management Systems is ISO ___",a:["22301","iso 22301"],
     explain:"ISO 22301 — the BCMS standard (continuity's answer to ISO 27001)."},
    {q:"A discussion-based continuity test with no real systems failed over is called a ___ exercise.",a:["tabletop","table-top","table top"],
     explain:"Tabletop exercise — a walkthrough; cheaper than a full failover test."},
   ]},
 ]},
);

/* ===================== ENGINE ===================== */
const S={meters:{},correct:{},labDone:{},projDone:{},openTask:{},user:"",view:"home"};
METERS.forEach(m=>S.meters[m.key]=m.start);
(function load(){try{const o=JSON.parse(localStorage.getItem("govlab4")||"{}");
  if(o.meters)S.meters=o.meters;if(o.correct)S.correct=o.correct;if(o.labDone)S.labDone=o.labDone;
  if(o.projDone)S.projDone=o.projDone;if(o.user)S.user=o.user;}catch(e){}})();
function save(){localStorage.setItem("govlab4",JSON.stringify({meters:S.meters,correct:S.correct,labDone:S.labDone,projDone:S.projDone,user:S.user}));}
function clamp(v){return Math.max(0,Math.min(100,Math.round(v)));}
function norm(s){return (s||"").trim().toLowerCase().replace(/[.,!?;:]/g,"").replace(/\s+/g," ");}
function esc(s){return String(s==null?"":s).replace(/[&<>"'`]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;","`":"&#96;"}[c]));}

function roomQs(r){let n=0;r.tasks.forEach(t=>n+=t.qs.length);return n;}
function roomCorrect(r){let n=0;r.tasks.forEach((t,ti)=>t.qs.forEach((q,qi)=>{if(S.correct[r.id+"|"+ti+"|"+qi])n++;}));return n;}
function roomDone(r){return roomCorrect(r)===roomQs(r);}
function totalXP(){
  let xp=0;
  ROOMS.forEach(r=>xp+=roomCorrect(r)*10);
  for(const k in S.labDone)xp+=Math.round((S.labDone[k]||0)*0.5);
  return xp;
}
function curRank(){let r=RANKS[0];for(const x of RANKS)if(totalXP()>=x.xp)r=x;return r;}
function nextRank(){return RANKS.find(x=>x.xp>totalXP())||null;}
function applyEff(eff){if(!eff)return;for(const k in eff)if(k in S.meters)S.meters[k]=clamp(S.meters[k]+eff[k]);}

function renderRank(){
  const xp=totalXP(),r=curRank(),nx=nextRank();
  rkName.textContent="⭐ "+r.name;
  const lo=r.xp,hi=nx?nx.xp:r.xp+1,pct=nx?Math.round(100*(xp-lo)/(hi-lo)):100;
  rkBar.style.width=pct+"%";rkXp.textContent=nx?`${xp}/${nx.xp} XP`:`${xp} XP · MAX`;
}
function metersHTML(){
  return `<div class="meters">${METERS.map(m=>{
    const v=S.meters[m.key],ratio=m.invert?100-v:v;
    const c=ratio>66?"var(--good)":ratio>33?"var(--warn)":"var(--bad)";
    return `<div class="gauge"><div class="lbl">${m.label}</div>
      <div class="val" id="g_${m.key}" style="color:${c}">${v}</div>
      <div class="track"><i id="gb_${m.key}" style="width:${v}%;background:${c}"></i></div></div>`;}).join("")}</div>`;
}
function animateMeters(){METERS.forEach(m=>{const v=S.meters[m.key],ratio=m.invert?100-v:v;
  const c=ratio>66?"var(--good)":ratio>33?"var(--warn)":"var(--bad)";
  const e=document.getElementById("g_"+m.key),b=document.getElementById("gb_"+m.key);
  if(e){e.textContent=v;e.style.color=c;}if(b){b.style.width=v+"%";b.style.background=c;}});}

function go(v){
  if(!S.user){renderLanding();return;}
  S.view=v;
  document.getElementById("topnav").style.display="flex";
  document.getElementById("rankwrap").style.display="flex";
  navDash.classList.toggle("active",v==="dashboard");
  navHome.classList.toggle("active",v==="home");
  navRoadmap.classList.toggle("active",v==="roadmaps");
  navProjects.classList.toggle("active",v==="projects");
  navCareer.classList.toggle("active",v==="career");
  document.getElementById("sidebar").style.display=(v==="dashboard"||v==="roadmaps")?"none":"block";
  renderSidebar();
  if(v==="dashboard")renderDashboard();
  else if(v==="roadmaps")renderRoadmaps();
  else if(v==="career")renderCareer();
  else if(v==="projects")renderProjects();
  else home();
  window.scrollTo(0,0);
}

function renderSidebar(){
  if(S.view==="projects"){
    const d=Object.keys(S.projDone).length;
    sidebar.innerHTML=`<div class="path-h">Client Projects</div>
      <div class="path-card" style="padding:14px"><div class="muted">Projects passed</div>
      <div style="font-size:24px;font-weight:700">${d}/${PROJECTS.length}</div></div>
      <button class="btn ghost" style="width:100%" onclick="go('home')">← Learn</button>`;return;}
  if(S.view==="career"){
    const dn=ROOMS.filter(roomDone).length;
    sidebar.innerHTML=`<div class="path-h">Progress</div>
      <div class="path-card" style="padding:14px"><div class="muted">Rooms complete</div>
      <div style="font-size:24px;font-weight:700">${dn}/${ROOMS.length}</div></div>
      <button class="btn ghost" style="width:100%" onclick="go('home')">← Learn</button>`;return;}
  let h="";
  PATHS.forEach(p=>{
    h+=`<div class="path-h">${p.name}</div>`;
    ROOMS.filter(r=>r.path===p.id).forEach(r=>{
      const dn=roomDone(r),cc=roomCorrect(r),tot=roomQs(r);
      h+=`<button class="room-btn ${dn?'done':''}" onclick="openRoom('${r.id}')">
        ${r.ic} ${r.title}${dn?'<span class="tick">✓</span>':`<span class="lab">${cc}/${tot}</span>`}
        <span class="meta">${r.diff.toUpperCase()} · ${tot} questions</span></button>`;

function ansText(id,ti,qi,inp){
  const r=ROOMS.find(x=>x.id===id),q=r.tasks[ti].qs[qi];
  const acc=Array.isArray(q.a)?q.a:[q.a];
  const fb=document.getElementById("fb_"+(id+"_"+ti+"_"+qi));
  if(acc.some(a=>norm(a)===norm(inp.value))){
    inp.classList.add("ok");inp.disabled=true;
    inp.nextElementSibling.outerHTML='<span class="flag">✓ Correct</span>';
    fb.className="qfb good show";fb.innerHTML="<b class='flag'>Correct.</b> "+(q.explain||"");
    markCorrect(id,ti,qi,r,q);
  }else{
    inp.classList.remove("ok");inp.style.borderColor="var(--bad)";
    fb.className="qfb bad show";fb.innerHTML="❌ Not quite — try again."+(q.hint?" Hint: "+q.hint:"");
    setTimeout(()=>inp.style.borderColor="",600);
  }
}
function ansChoice(id,ti,qi,oi,btn){

function labRisk(){
  const C=["#3fb950","#79b341","#e3b341","#e88c2f","#f85149"];
  labShell("risk",`<p class="muted">Scenario: <b>AI résumé-screening tool ranking job candidates</b>. Set
    likelihood &amp; impact to reflect real harm; the marker &amp; tier update live. Then submit.</p>
    <div class="matrix-wrap"><div><svg id="mx" width="280" height="280" viewBox="0 0 280 280"></svg></div>
      <div class="sliders">
        <div class="slider-row"><label>Likelihood <b id="lkV">3</b>/5</label><input type="range" id="lk" min="1" max="5" value="3"></div>
        <div class="slider-row"><label>Impact <b id="imV">3</b>/5</label><input type="range" id="im" min="1" max="5" value="3"></div>
        <div class="muted">Risk score = Likelihood × Impact</div>
        <div class="tier-out" id="to">—</div>
        <button class="btn" id="sub" style="margin-top:10px">Submit Assessment</button></div></div><div id="rf"></div>`);
  const svg=document.getElementById("mx"),cell=50,pad=15;
  const band=s=>s<=4?0:s<=8?1:s<=12?2:s<=16?3:4, tier=s=>s<=4?"Low":s<=9?"Medium":s<=15?"High":"Critical";
  function draw(){let h="";for(let i=0;i<5;i++)for(let j=0;j<5;j++){const s=(j+1)*(5-i);
      h+=`<rect x="${pad+j*cell}" y="${pad+i*cell}" width="${cell}" height="${cell}" fill="${C[band(s)]}" opacity=".55" stroke="#0a0e14" stroke-width="2"/>`;}
    const lk=+lkEl.value,im=+imEl.value,cx=pad+(lk-1)*cell+cell/2,cy=pad+(5-im)*cell+cell/2;
    h+=`<circle class="marker" cx="${cx}" cy="${cy}" r="16" fill="#fff" stroke="#0a0e14" stroke-width="3"/>`;
    h+=`<text x="${cx}" y="${cy+5}" text-anchor="middle" font-size="14" font-weight="800" fill="#0a0e14">${lk*im}</text>`;
    h+=`<text x="${pad+2.5*cell}" y="278" text-anchor="middle" font-size="11" fill="#8b98a9">Likelihood →</text>`;
    svg.innerHTML=h;const s=lk*im,o=document.getElementById("to");o.textContent=tier(s)+" ("+s+")";o.style.color=C[band(s)];}
  const lkEl=document.getElementById("lk"),imEl=document.getElementById("im");
  function upd(){lkV.textContent=lkEl.value;imV.textContent=imEl.value;draw();}
  lkEl.oninput=upd;imEl.oninput=upd;draw();
  document.getElementById("sub").onclick=()=>{const lk=+lkEl.value,im=+imEl.value,t=tier(lk*im);
    const impOK=im>=4,likeOK=lk>=3,tierOK=t==="High"||t==="Critical";
    const score=Math.round(100*((impOK?.4:0)+(likeOK?.3:0)+(tierOK?.3:0)));
    document.getElementById("rf").innerHTML=`<div class="fb ${score>=70?'good':'bad'}"><div class="mh">${score>=70?'✅ Sound':'⚠ Re-think'}</div>
      Hiring decisions affect livelihoods → <b>high impact</b>; an automated ranker acts on every applicant → <b>high likelihood</b> of effect. EU AI Act lists hiring as <b>High-risk</b>. ${tierOK?'':'This should land High/Critical, not '+t+'.'}</div>`;
    setTimeout(()=>{animateMeters();labFinish("risk",score,{compliance:+8,risk:-5},score>=70?"Correctly tiered":"Mis-tiered");},900);};
}

      if(placed===C.length){const score=Math.max(0,Math.round(100*(C.length-wrong)/(C.length+wrong)));
        document.getElementById("mf").innerHTML='<div class="fb good"><div class="mh">✅ Mapped</div>Mapping proves coverage and exposes gaps — lots under Measure but nothing under Govern would mean testing with no foundation.</div>';
        setTimeout(()=>{animateMeters();labFinish("mapping",score,{compliance:+10},wrong===0?"Perfect":"Mapped with retries");},700);}
    }else{wrong++;chip.classList.add("no");setTimeout(()=>chip.classList.remove("no"),400);
      document.getElementById("mf").innerHTML=`<div class="fb bad"><div class="mh">✗ Wrong function</div>Hint: ${col.dataset.f} = ${col.dataset.f==='Govern'?'policy/accountability':col.dataset.f==='Map'?'identify context & risks':col.dataset.f==='Measure'?'test/quantify':'respond & prioritise'}.</div>`;}
  }
  document.querySelectorAll(".chip").forEach(ch=>{
    ch.addEventListener("dragstart",()=>{drag=ch;ch.style.opacity=".4";});
    ch.addEventListener("dragend",()=>ch.style.opacity="1");
    ch.addEventListener("click",()=>{if(ch.classList.contains("ok"))return;
      const on=ch.classList.contains("sel");document.querySelectorAll(".chip.sel").forEach(c=>c.classList.remove("sel"));
      if(!on){ch.classList.add("sel");picked=ch;}else picked=null;});
    ch.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();ch.click();}});});
  document.querySelectorAll(".map-col").forEach(col=>{
    col.addEventListener("dragover",e=>{e.preventDefault();col.classList.add("over");});
    col.addEventListener("dragleave",()=>col.classList.remove("over"));
    col.addEventListener("drop",e=>{e.preventDefault();col.classList.remove("over");if(drag){place(drag,col);drag=null;}});
    col.addEventListener("click",()=>{if(picked)place(picked,col);});
    col.addEventListener("keydown",e=>{if((e.key==="Enter"||e.key===" ")&&picked){e.preventDefault();place(picked,col);}});});
}

function labIncident(){
  const STEPS=[{t:"🧯 Contain — take the chatbot offline",k:"contain"},{t:"🔎 Assess — what data was exposed",k:"assess"},
    {t:"📣 Notify the DPO",k:"dpo"},{t:"🏛️ Assess GDPR 72-hour regulator notice",k:"reg"},
    {t:"🧪 Root-cause analysis (RCA)",k:"rca"},{t:"🛠️ Log CAPA + add control & test",k:"capa"}];
  const order=["contain","assess","dpo","reg","rca","capa"];
  let idx=0,exposed=0,contained=false,mistakes=0,t0=Date.now(),raf;
  const shown=[...STEPS].sort(()=>Math.random()-.5);
  labShell("incident",`<p class="muted"><b>LIVE INCIDENT:</b> your support chatbot is leaking customers' personal
    data right now. Records leak until you contain it. Click actions in the correct order — containment first!</p>
    <div class="harm-wrap"><div class="muted">Records exposed <span class="timer" id="tmr">0.0s</span></div>
      <div class="harm-num" id="harm">0</div><div class="harm-track"><i id="hb"></i></div><div id="cm"></div></div>
    <div class="actions-list" id="acts">${shown.map(s=>`<div class="action" data-k="${s.k}"><span>${s.t}</span><span class="step"></span></div>`).join("")}</div><div id="if"></div>`);
  function loop(){const el=Date.now()-t0;document.getElementById("tmr").textContent=(el/1000).toFixed(1)+"s";
    if(!contained){exposed=Math.floor(el/100)*7;document.getElementById("harm").textContent=exposed.toLocaleString();
      document.getElementById("hb").style.width=Math.min(100,exposed/30)+"%";raf=requestAnimationFrame(loop);}}
  raf=requestAnimationFrame(loop);
  document.querySelectorAll("#acts .action").forEach(a=>{a.onclick=()=>{if(a.classList.contains("done"))return;
    const k=a.dataset.k,want=order[idx];
    if(k===want){a.classList.add("done");a.querySelector(".step").textContent="step "+(idx+1);idx++;
      if(k==="contain"){contained=true;cancelAnimationFrame(raf);document.getElementById("harm").style.color="var(--good)";
        document.getElementById("cm").innerHTML=`<div class="contained">✅ Contained — stopped at ${exposed.toLocaleString()} records.</div>`;}
      if(idx===order.length){const pen=Math.min(40,Math.floor(exposed/200));const score=Math.max(20,100-mistakes*15-pen);
        document.getElementById("if").innerHTML=`<div class="fb good"><div class="mh">✅ Incident closed</div>Order: contain → assess → notify (DPO + 72h) → RCA → CAPA. Stopped at <b>${exposed.toLocaleString()}</b> records, <b>${mistakes}</b> wrong moves.</div>`;
        setTimeout(()=>{animateMeters();labFinish("incident",score,{risk:-12,compliance:+8,rep:+5},score>=70?"Handled well":"Costly");},900);}
    }else{mistakes++;a.classList.add("no");setTimeout(()=>a.classList.remove("no"),400);
      const hint=!contained?"Contain the leak FIRST — every second exposes more records.":"Wrong order. Next: "+({assess:"assess exposure",dpo:"notify DPO",reg:"check GDPR 72h",rca:"root-cause",capa:"log CAPA"})[want];
      document.getElementById("if").innerHTML=`<div class="fb bad"><div class="mh">✗ Out of order</div>${hint}</div>`;}};});
}

/* ---- LAB: Risk Register ---- */
function labRegister(){
  const CTRL=[{t:"Apply security patches",g:true},{t:"Deploy a Web Application Firewall (WAF)",g:true},
    {t:"Encrypt data at rest",g:true},{t:"Enforce MFA on admin access",g:true},{t:"Upgrade the server's RAM and CPU",g:false}];
  let sel={},treatment=null;
  labShell("register",`<p class="muted">Scenario: an <b>internet-facing server, unpatched, holding customer PII</b>.
    Complete its risk-register row.</p>
    <div class="slider-row"><label>Likelihood <b id="lkV">3</b>/5</label><input type="range" id="lk" min="1" max="5" value="3"></div>
    <div class="slider-row"><label>Impact <b id="imV">3</b>/5</label><input type="range" id="im" min="1" max="5" value="3"></div>
    <div class="muted">Inherent risk = Likelihood × Impact</div><div class="tier-out" id="inh">—</div>
    <h4 style="color:var(--accent);margin:16px 0 4px">Apply controls (lowers residual)</h4>
    <div>${CTRL.map((c,i)=>`<div class="checkrow" id="rc${i}" onclick="window._rc(${i})"><div class="cb"></div><div>${c.t}</div></div>`).join("")}</div>
    <div class="muted">Residual risk after controls</div><div class="tier-out" id="res">—</div>
    <h4 style="color:var(--accent);margin:16px 0 4px">Choose risk treatment</h4>
    <div class="opts">${["Avoid","Reduce","Transfer","Accept"].map(t=>`<button class="opt" onclick="window._treat('${t}',this)">${t}</button>`).join("")}</div>
    <div id="rgf"></div>`);
  const tier=s=>s<=4?"Low":s<=9?"Medium":s<=15?"High":"Critical";
  const col=s=>s<=4?"var(--good)":s<=9?"var(--warn)":s<=15?"#e88c2f":"var(--bad)";
  const lkEl=document.getElementById("lk"),imEl=document.getElementById("im");
  function recompute(){const lk=+lkEl.value,im=+imEl.value,inh=lk*im;
    document.getElementById("lkV").textContent=lk;document.getElementById("imV").textContent=im;
    const ie=document.getElementById("inh");ie.textContent=tier(inh)+" ("+inh+")";ie.style.color=col(inh);
    const goodSel=CTRL.filter((c,i)=>sel[i]&&c.g).length,res=Math.max(1,inh-goodSel*4);
    const re=document.getElementById("res");re.textContent=tier(res)+" ("+res+")";re.style.color=col(res);
    return {lk,im,inh,res,goodSel,badSel:CTRL.some((c,i)=>sel[i]&&!c.g)};}
  lkEl.oninput=recompute;imEl.oninput=recompute;recompute();
  window._rc=function(i){sel[i]=!sel[i];const el=document.getElementById("rc"+i);el.classList.toggle("sel",sel[i]);
    el.querySelector(".cb").textContent=sel[i]?"✓":"";recompute();};
  window._treat=function(t,btn){treatment=t;document.querySelectorAll(".opts .opt").forEach(b=>b.classList.remove("sel"));btn.classList.add("sel");
    const st=recompute();
    const inhOK=st.im>=4&&st.lk>=4, ctrlOK=st.goodSel>=2&&!st.badSel, treatOK=(st.res>4)?(t==="Reduce"||t==="Avoid"):(t==="Accept"||t==="Transfer");
    const score=Math.round(100*((inhOK?.34:0)+(ctrlOK?.33:0)+(treatOK?.33:0)));
    document.getElementById("rgf").innerHTML=`<div class="fb ${score>=70?'good':'bad'}"><div class="mh">${score>=70?'✅ Solid register row':'⚠ Reconsider'}</div>
      Internet-facing + unpatched + PII = high likelihood and maximum impact → <b>inherent High/Critical</b>. Patching, WAF, encryption and MFA <b>Reduce</b> it. With residual still elevated the treatment is <b>Reduce</b> (or Avoid) — never Accept. ${st.badSel?'(Repainting the office is not a security control.)':''}</div>`;
    setTimeout(()=>{animateMeters();labFinish("register",score,{risk:-8,compliance:+8},score>=70?"Risk treated correctly":"Treatment off");},1100);
  };
}

/* ===================== GENERIC STAGED CHALLENGE RUNNER ===================== */
/* stages: [{type:"multi"|"one", q, options:[{t,correct}], explain}] -> onComplete(scorePct) */
function runStages(host, stages, onComplete){
  let idx=0, scores=[];
  show();
  function show(){
    if(idx>=stages.length){onComplete(Math.round(100*scores.reduce((a,b)=>a+b,0)/scores.length));return;}
    const s=stages[idx]; let sel={};
    host.innerHTML=`<div class="muted">Step ${idx+1} of ${stages.length}${s.type==='multi'?' · select ALL that apply':''}</div>
      <div class="q2">${s.q}</div>
      <div id="stOpts">${s.options.map((o,i)=>`<div class="checkrow" data-i="${i}" onclick="window._stPick(${i})"><div class="cb"></div><div>${o.t}</div></div>`).join("")}</div>
      <button class="btn" style="margin-top:10px" onclick="window._stSub()">Submit</button><div id="stf"></div>`;
    window._stPick=function(i){
      if(s.type==='one'){sel={};document.querySelectorAll('#stOpts .checkrow').forEach(e=>{e.classList.remove('sel');e.querySelector('.cb').textContent='';});}
      sel[i]=!sel[i];const el=document.querySelector('#stOpts .checkrow[data-i="'+i+'"]');
      el.classList.toggle('sel',sel[i]);el.querySelector('.cb').textContent=sel[i]?'✓':'';
    };
    window._stSub=function(){
      let correct=0;s.options.forEach((o,i)=>{const chose=!!sel[i];if(chose===o.correct)correct++;
        const el=document.querySelector('#stOpts .checkrow[data-i="'+i+'"]');el.classList.remove('sel');
        el.classList.add(chose===o.correct?'right':'wrong');el.querySelector('.cb').textContent=o.correct?'✓':'✕';el.onclick=null;});
      const sc=correct/s.options.length;scores.push(sc);
      document.getElementById('stf').innerHTML=`<div class="fb ${sc>=.7?'good':'bad'}"><div class="mh">${sc>=.7?'✅ '+correct+'/'+s.options.length+' correct':'⚠ '+correct+'/'+s.options.length+' correct'}</div>${s.explain}</div>
        <button class="btn" style="margin-top:8px" onclick="window._stNext()">${idx+1<stages.length?'Next step →':'See result'}</button>`;
    };
    window._stNext=function(){idx++;show();};
  }
}

}
function openProject(id){
  const p=PROJECTS.find(x=>x.id===id);if(!p)return;
  navProjects.classList.add("active");
  main.innerHTML=`<div class="roomhead"><div class="muted">Client Project · consult & deliver</div>
      <h2>${p.ic} ${p.client}</h2>
      <div class="callout why" style="margin-top:10px"><b>Client brief:</b> ${p.brief}</div>
      ${metersHTML()}</div>
    ${projSkillsHTML(id)}
    <div class="path-card"><div id="pjbody"></div></div>
    <div style="margin:10px 0 30px"><button class="btn ghost" onclick="go('projects')">← All projects</button></div>`;
  runStages(document.getElementById("pjbody"),p.stages,sc=>projFinish(id,sc));
  window.scrollTo(0,0);
}
function projFinish(id,score){
  const p=PROJECTS.find(x=>x.id===id);
  if(!S.projDone[id]||score>S.projDone[id])S.projDone[id]=score;save();renderRank();
  const pass=score>=70,col=pass?"var(--good)":"var(--bad)";
  const ov=document.createElement("div");ov.className="overlay";
  ov.innerHTML=`<div class="result"><div class="muted">${p.client}</div>
    <div class="grade" style="color:${col}">${pass?'PASS':'FAIL'}</div>
    <div style="color:${col};font-weight:700">${score}% — ${pass?'Engagement delivered':'Client not satisfied'}</div>
    <div style="margin:14px 0" class="muted">${pass?'You designed a compliant, defensible governance program for this client.':'Review the frameworks, risk tier and controls, then retry.'}</div>
    <button class="btn" onclick="this.closest('.overlay').remove();openProject('${id}')">Retry</button>
    <button class="btn ghost" onclick="this.closest('.overlay').remove();go('projects')">All projects</button></div>`;
  document.body.appendChild(ov);
  if(pass){applyEff({compliance:+8,trust:+5,rep:+4});}
}

function login(){let v=(document.getElementById("nameIn")&&document.getElementById("nameIn").value||"").trim();

function logout(){S.user="";save();renderLanding();}
function setUserChip(){const c=document.getElementById("userchip");if(!c)return;
  const init=(S.user||"L").trim().charAt(0).toUpperCase();
  c.innerHTML=`<span class="av">${esc(init)}</span><span>${esc(S.user)}</span> <button class="logout" onclick="logout()">exit</button>`;}

/* ===================== PROGRESS HELPERS ===================== */
function pathPct(pid){const rs=ROOMS.filter(r=>r.path===pid);if(!rs.length)return 0;return Math.round(100*rs.filter(roomDone).length/rs.length);}
function overallPct(){const tot=ROOMS.length+Object.keys(LAB_META).length+PROJECTS.length;
  const done=ROOMS.filter(roomDone).length+Object.keys(S.labDone).length+Object.keys(S.projDone).length;
  return tot?Math.round(100*done/tot):0;}
function openRoomPath(pid){const rs=ROOMS.filter(r=>r.path===pid);const t=rs.find(r=>!roomDone(r))||rs[0];if(t)openRoom(t.id);}

/* ===================== DASHBOARD ===================== */
function renderDashboard(){
  const pct=overallPct(),C=2*Math.PI*66,off=C*(1-pct/100);
  const roomsDone=ROOMS.filter(roomDone).length,labsDone=Object.keys(S.labDone).length,projDone=Object.keys(S.projDone).length;
  let next=null;for(const p of PATHS){for(const r of ROOMS.filter(x=>x.path===p.id)){if(!roomDone(r)){next=r;break;}}if(next)break;}
  const pathBars=PATHS.filter(p=>!p.id.startsWith("lib")).map(p=>{const pp=pathPct(p.id);
    return `<div class="dash-path" onclick="openRoomPath('${p.id}')"><span class="dpi">${p.id==='p7'?'📝':'📘'}</span>
      <span class="dpn">${p.name}</span><span class="dpp"><div class="pbar"><i style="width:${pp}%"></i></div></span><span class="dpx">${pp}%</span></div>`;}).join("");
  main.innerHTML=`<div class="hero">
      <div class="dash-top">
        <div class="ringwrap"><svg width="150" height="150" viewBox="0 0 150 150">
          <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4d9fff"/><stop offset="1" stop-color="#bc8cff"/></linearGradient></defs>
          <circle class="ring-bg" cx="75" cy="75" r="66"/>
          <circle class="ring-fg" id="ringfg" cx="75" cy="75" r="66" stroke-dasharray="${C}" stroke-dashoffset="${C}"/></svg>
          <div class="rt"><b id="ringpct">0%</b><span>complete</span></div></div>
        <div style="flex:1;min-width:240px">
          <h2 style="margin:0">Welcome back, ${esc(S.user)} 👋</h2>
          <div class="muted" style="margin-bottom:10px">Rank: <b style="color:var(--purple)">${curRank().name}</b> · ${totalXP()} XP</div>
          <div class="dash-stats">
            <div class="stat-card"><b>${roomsDone}/${ROOMS.length}</b><span>rooms</span></div>
            <div class="stat-card"><b>${labsDone}/${Object.keys(LAB_META).length}</b><span>labs</span></div>
            <div class="stat-card"><b>${projDone}/${PROJECTS.length}</b><span>projects</span></div>
            <div class="stat-card"><b>${totalXP()}</b><span>XP</span></div>
          </div></div>
      </div></div>
    ${next?`<div class="continue"><div class="ci">${next.ic}</div>
      <div style="flex:1"><div class="muted">Continue where you left off</div><div style="font-weight:700;font-size:16px">${next.title}</div></div>
      <button class="btn" onclick="openRoom('${next.id}')">Resume →</button></div>`
     :`<div class="continue"><div class="ci">🏆</div><div style="flex:1"><b>All rooms complete!</b> <span class="muted">Tackle the client projects &amp; capstone.</span></div><button class="btn" onclick="go('projects')">Projects →</button></div>`}
    ${certEligible()?`<div class="continue" style="border-color:var(--good)"><div class="ci">🎓</div>
      <div style="flex:1"><b>Program complete!</b> <span class="muted">Every room, lab &amp; project done — claim your certificate.</span></div>
      <button class="btn good" onclick="generateCertificate()">Get Certificate</button></div>`:''}
    <div class="path-card"><h3 style="margin-top:0">📚 Your learning paths</h3>${pathBars}
      <div style="margin-top:12px"><button class="btn ghost" onclick="go('home')">All modules</button>
      <button class="btn ghost" onclick="go('roadmaps')">View roadmaps →</button></div></div>
    ${labsHubHTML()}`;
  setTimeout(()=>{const r=document.getElementById("ringfg");if(r)r.style.strokeDashoffset=off;
    const pe=document.getElementById("ringpct");if(pe){let n=0;const t=setInterval(()=>{n+=Math.ceil(pct/20)||1;if(n>=pct){n=pct;clearInterval(t);}pe.textContent=n+"%";},40);}},120);
}

function stepDone(ref){if(ref.type==="room"){const r=ROOMS.find(x=>x.id===ref.id);return !!(r&&roomDone(r));}
  if(ref.type==="lab")return !!S.labDone[ref.id];
  if(ref.type==="path")return pathPct(ref.id)===100;
  if(ref.type==="view")return Object.keys(S.projDone).length>0;return false;}
function roadGo(type,id){if(type==="room")openRoom(id);else if(type==="lab")openLab(id);
  else if(type==="path")openRoomPath(id);else if(type==="view")go(id);}
function renderRoadmaps(){
  main.innerHTML=`<div class="hero"><div class="muted">Pick your destination</div>

    <p class="muted">Three guided tracks. Each milestone links straight to its module, lab or project. Green = done. Follow top to bottom.</p>
    <div class="track-pick">${ROADMAPS.map(rm=>{const done=rm.steps.filter(s=>stepDone(s.ref)).length,pct=Math.round(100*done/rm.steps.length);
      return `<div class="track-btn ${rm.id==='grc'?'gr':rm.id==='cloud'?'cl':'ai'}" onclick="document.getElementById('rm_${rm.id}').scrollIntoView({behavior:'smooth'})">

    ROADMAPS.map(rm=>{const done=rm.steps.filter(s=>stepDone(s.ref)).length,pct=Math.round(100*done/rm.steps.length);
      const ms=rm.steps.map(s=>{const dn=stepDone(s.ref);
        return `<div class="milestone ${dn?'done':''}" onclick="roadGo('${s.ref.type}','${s.ref.id}')">
          <div class="mt">${s.t}${dn?'<span class="mtag">done</span>':'<span class="mtag">start</span>'}</div><div class="md">${s.d}</div></div>`;}).join("");
      return `<div class="rmap" id="rm_${rm.id}"><h3>${rm.ic} ${rm.name}</h3><div class="rsub">${rm.sub}</div>
        <div class="pbar" style="margin-bottom:14px"><i style="width:${pct}%"></i></div>
        <div class="timeline">${ms}</div></div>`;}).join("");
}

/* ===================== CERTIFICATE ===================== */
function certEligible(){
  const roomsOK=ROOMS.every(roomDone);
  const labsOK=Object.keys(LAB_META).every(k=>!!S.labDone[k]);
  const projOK=PROJECTS.every(p=>(S.projDone[p.id]||0)>=70);
  return roomsOK&&labsOK&&projOK;
}
