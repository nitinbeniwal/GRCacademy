<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; base-uri 'none'; form-action 'none'; frame-ancestors 'none'"/>
<meta name="referrer" content="no-referrer"/>
<title>GovernAI Lab — GRC &amp; AI Governance, Zero to Master</title>
<style>
:root{
  --bg:#eef2f8;--panel:#ffffff;--panel2:#f3f6fb;--line:#d8e0ec;--text:#1b2a3a;
  --muted:#5b6b80;--accent:#2563a8;--good:#1f9254;--warn:#c47a1a;--bad:#d13b3b;
  --purple:#7c5cd6;--chip:#eaf0f9;--green2:#e6f5ec;
  --okbg:#e6f5ec;--nobg:#fdeaea;--warnbg:#fbf2e0;--accbg:#e8f1fb;--pbg:#f0eafb;
  --inputbg:#ffffff;--ink:#ffffff;--track:#e3e9f2;
  --shadow:0 1px 3px rgba(27,42,58,.06),0 4px 14px rgba(27,42,58,.05);
  --shadow-lg:0 10px 34px rgba(27,42,58,.14);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);
     color:var(--text);line-height:1.55}
code,.mono{font-family:"SF Mono",Consolas,monospace}
h1,h2,h3,.roomhead h2,.path-card h3,.rmap h3{font-family:Georgia,"Times New Roman",serif;letter-spacing:.2px}
header{padding:11px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;
       gap:16px;flex-wrap:wrap;background:linear-gradient(180deg,#ffffff,#f6f9fd);position:sticky;top:0;z-index:20;
       box-shadow:0 2px 10px rgba(27,42,58,.05)}
header h1{font-size:17px;margin:0;cursor:pointer;letter-spacing:.3px}
nav{display:flex;gap:6px}
nav button{background:transparent;border:1px solid transparent;color:var(--muted);padding:6px 13px;
           border-radius:7px;cursor:pointer;font-size:13px;font-weight:600}
nav button.active{color:#fff;background:var(--accent);border-color:var(--accent)}
.rankwrap{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:12px}
.rankwrap .rk{color:var(--purple);font-weight:700}
.xpbar{width:120px;height:6px;background:var(--track);border-radius:3px;overflow:hidden}
.xpbar>i{display:block;height:100%;background:linear-gradient(90deg,#7c5cd6,#a98ae6);transition:width .6s}
.wrap{display:flex;min-height:calc(100vh - 52px)}
.sidebar{width:290px;border-right:1px solid var(--line);background:var(--panel);padding:12px;overflow-y:auto;
         max-height:calc(100vh - 52px);position:sticky;top:52px}
.main{flex:1;padding:24px 30px;max-width:880px}
.path-h{font-size:10px;color:var(--purple);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 6px;font-weight:800}
.room-btn{display:block;width:100%;text-align:left;background:var(--chip);color:var(--text);
          border:1px solid var(--line);border-radius:8px;padding:10px 11px;margin-bottom:6px;cursor:pointer;font-size:13px;transition:.15s}
.room-btn:hover{border-color:var(--accent);transform:translateX(2px)}
.room-btn.done{border-color:var(--good)}
.room-btn .meta{display:block;font-size:10px;color:var(--muted);margin-top:2px}
.room-btn .tick{float:right;color:var(--good)}
.room-btn .lab{float:right;font-size:10px;color:var(--warn)}
/* dashboards */
.hero{background:linear-gradient(135deg,#e8f1fb,#f0eafb);border:1px solid #cfe0f3;border-radius:16px;padding:26px;margin-bottom:18px;box-shadow:var(--shadow)}
.hero h2{font-size:26px;margin:0 0 6px}
.meters{display:flex;gap:12px;flex-wrap:wrap;margin:16px 0}
.gauge{flex:1;min-width:130px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.gauge .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.gauge .val{font-size:24px;font-weight:700;transition:color .4s}
.gauge .track{height:7px;border-radius:4px;background:var(--track);margin-top:6px;overflow:hidden}
.gauge .track>i{display:block;height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,1.3,.5,1),background .4s}
.path-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.path-card h3{margin:0 0 4px;font-size:17px}
.path-card .pd{color:var(--muted);font-size:13px;margin-bottom:10px}
.room-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:10px;
          margin-bottom:7px;cursor:pointer;transition:.15s;background:var(--panel2)}
.room-row:hover{border-color:var(--accent);transform:translateX(3px)}
.room-row .ic{font-size:20px}
.room-row .rt{flex:1}
.room-row .rt b{font-size:14px}
.room-row .rt span{display:block;font-size:11px;color:var(--muted)}
.room-row .st{font-size:11px;color:var(--muted)}
.room-row.done{border-color:var(--good)}
.room-row.done .st{color:var(--good)}
.diff{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:700}
.diff.easy{background:var(--okbg);color:var(--good)} .diff.med{background:var(--warnbg);color:var(--warn)}
.diff.hard{background:var(--nobg);color:var(--bad)} .diff.lab{background:var(--pbg);color:var(--purple)}
/* ROOM (THM style) */
.roomhead{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:16px;box-shadow:var(--shadow)}
.roomhead h2{margin:0 0 6px;font-size:23px}
.roomhead .sub{color:var(--muted);font-size:13px}
.rprog{height:8px;background:var(--track);border-radius:5px;overflow:hidden;margin-top:12px}
.rprog>i{display:block;height:100%;background:linear-gradient(90deg,#1f9254,#36b06f);width:0;transition:width .5s}
.task{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow)}
.task-h{padding:14px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--panel2)}
.task-h .num{width:26px;height:26px;border-radius:50%;background:var(--chip);border:1px solid var(--line);
             display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.task-h.complete .num{background:var(--good);color:var(--ink);border-color:var(--good)}
.task-h b{flex:1;font-size:15px}
.task-h .chev{color:var(--muted);transition:transform .2s}
.task.open .chev{transform:rotate(90deg)}
.task-body{padding:0 18px;max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s}
.task.open .task-body{max-height:4000px;padding:6px 18px 18px}
.info{font-size:14.5px;line-height:1.7}
.info h4{margin:16px 0 6px;font-size:14px;color:var(--accent)}
.info ul{margin:8px 0;padding-left:20px} .info li{margin:5px 0}
.info b{color:var(--text)} .info em{color:var(--purple);font-style:normal}
.info table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.info td,.info th{border:1px solid var(--line);padding:7px 9px;text-align:left}
.info th{background:var(--panel2);color:var(--muted)}
.callout{background:var(--accbg);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;margin:12px 0;font-size:13.5px}
.callout.why{border-color:var(--purple)}.callout.why b{color:var(--purple)}
.q{margin:14px 0;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px}
.q .qt{font-size:14px;margin-bottom:8px}
.q .qt::before{content:"❓ ";}
.ansrow{display:flex;gap:8px;flex-wrap:wrap}
.ansrow input{flex:1;min-width:200px;background:var(--inputbg);color:var(--text);border:1px solid var(--line);
              border-radius:8px;padding:10px;font-size:14px;font-family:"SF Mono",Consolas,monospace}
.ansrow input.ok{border-color:var(--good);background:var(--okbg)}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{text-align:left;background:var(--inputbg);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:10px 12px;cursor:pointer;font-size:14px}
.opt:hover{border-color:var(--accent)}
.opt.ok{border-color:var(--good);background:var(--okbg)}
.opt.no{border-color:var(--bad);background:var(--nobg);animation:shake .3s}
.btn{background:var(--accent);color:var(--ink);border:none;border-radius:9px;padding:10px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.btn:hover{filter:brightness(1.1)} .btn:disabled{opacity:.4;cursor:default}
.btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn.bad{background:var(--bad);color:#fff}.btn.good{background:var(--good)}
.btn.sm{padding:7px 12px;font-size:12px}
.qfb{margin-top:8px;font-size:13px;padding:9px 12px;border-radius:8px;display:none}
.qfb.show{display:block;animation:slideIn .3s}
.qfb.good{background:var(--okbg);border:1px solid var(--good)} .qfb.bad{background:var(--nobg);border:1px solid var(--bad)}
.hintbtn{font-size:12px;color:var(--warn);cursor:pointer;margin-top:6px;display:inline-block}
.flag{color:var(--good);font-weight:700}
@keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes pop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.xptoast{position:fixed;bottom:24px;right:24px;background:var(--purple);color:var(--ink);font-weight:800;
         padding:12px 18px;border-radius:12px;z-index:60;animation:pop .4s;box-shadow:0 6px 24px rgba(27,42,58,.22)}
.muted{color:var(--muted);font-size:13px}
/* ===== interactive lab styles ===== */
.office{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0;position:relative}
.dept{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px 10px;text-align:center;position:relative;min-height:94px;display:flex;flex-direction:column;justify-content:center;gap:4px}
.dept .nm{font-size:12px;color:var(--muted)} .dept .di{font-size:26px;opacity:.5}
.ai-found{animation:pop .5s;cursor:pointer;border:2px solid var(--warn)!important;background:var(--warnbg)!important}
.ai-found .di{opacity:1}
.ai-found.logged{border-color:var(--good)!important;background:var(--okbg)!important;cursor:default}
.ai-tag{position:absolute;top:6px;right:8px;font-size:9px;background:var(--warn);color:#000;padding:1px 5px;border-radius:6px;font-weight:700}
.ai-found.logged .ai-tag{background:var(--good)}
.radar{position:absolute;inset:0;border-radius:12px;pointer-events:none;overflow:hidden;display:none}
.radar.on{display:block}
.radar::after{content:"";position:absolute;top:50%;left:50%;width:200%;height:200%;background:conic-gradient(from 0deg,rgba(37,99,168,.28),transparent 25%);transform:translate(-50%,-50%);animation:sweep 1.4s linear infinite}
@keyframes sweep{to{transform:translate(-50%,-50%) rotate(360deg)}}
.inspector{background:var(--panel2);border:1px solid var(--accent);border-radius:12px;padding:16px;margin-top:14px;animation:slideIn .3s}
.field{margin:10px 0}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
select,.txt{width:100%;background:var(--inputbg);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:9px;font-size:14px}
.registry{margin-top:14px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.registry .rhd{background:var(--panel2);padding:8px 12px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.registry .rrow{padding:9px 12px;border-top:1px solid var(--line);font-size:13px;display:flex;justify-content:space-between;animation:slideIn .3s}
.matrix-wrap{display:flex;gap:24px;flex-wrap:wrap;align-items:center;margin:16px 0}
.marker{transition:cx .5s cubic-bezier(.4,1.3,.5,1),cy .5s cubic-bezier(.4,1.3,.5,1);filter:drop-shadow(0 0 6px #fff)}
.sliders{flex:1;min-width:240px}.slider-row{margin:16px 0}
.slider-row label{font-size:13px;display:flex;justify-content:space-between}.slider-row label b{color:var(--accent)}
input[type=range]{width:100%;accent-color:var(--accent)}
.tier-out{font-size:28px;font-weight:800;margin-top:8px;transition:color .4s}
.map-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:14px 0}
.map-col{background:var(--panel2);border:2px dashed var(--line);border-radius:12px;padding:10px;min-height:150px}
.map-col.over{border-color:var(--accent);background:var(--accbg)}
.map-col .ch{font-size:12px;font-weight:700;text-align:center;color:var(--purple);margin-bottom:8px}
.chip{background:var(--chip);border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin:6px 0;font-size:12.5px;cursor:grab}
.chip.ok{border-color:var(--good);background:var(--okbg)}.chip.no{border-color:var(--bad);background:var(--nobg);animation:shake .3s}
.pool{display:flex;flex-wrap:wrap;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;margin:12px 0}
.pool .chip{margin:0}
.barchart{display:flex;gap:30px;align-items:flex-end;height:220px;margin:18px 0;padding:0 10px;border-bottom:2px solid var(--line)}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;cursor:pointer}
.bar{width:70px;border-radius:8px 8px 0 0;height:0;transition:height 1s cubic-bezier(.2,.8,.3,1);position:relative}
.bar .pct{position:absolute;top:-22px;left:0;right:0;text-align:center;font-weight:700;font-size:14px}
.barlbl{margin-top:8px;font-size:13px;color:var(--muted)}.barcol.sel .bar{outline:3px solid var(--accent);outline-offset:2px}
.harm-wrap{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px;margin:14px 0}
.harm-num{font-size:38px;font-weight:800;color:var(--bad);transition:color .3s}
.harm-track{height:14px;background:var(--track);border-radius:8px;overflow:hidden;margin-top:8px}
.harm-track>i{display:block;height:100%;background:linear-gradient(90deg,#c47a1a,#d13b3b);width:0%;transition:width .3s}
.timer{font-family:monospace;font-size:14px;color:var(--muted)}
.actions-list{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.action{background:var(--chip);border:1px solid var(--line);border-radius:10px;padding:12px 14px;cursor:pointer;font-size:14px;transition:.15s;display:flex;justify-content:space-between;align-items:center}
.action:hover{border-color:var(--accent)}.action.done{border-color:var(--good);background:var(--okbg);cursor:default;opacity:.7}
.action .step{font-size:11px;color:var(--good)}.contained{color:var(--good);font-weight:700;animation:pop .4s}
.overlay{position:fixed;inset:0;background:rgba(27,42,58,.5);display:flex;align-items:center;justify-content:center;z-index:50;animation:slideIn .3s}
.result{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:32px;text-align:center;max-width:440px;width:90%;box-shadow:var(--shadow-lg)}
.result .grade{font-size:56px;font-weight:800;margin:6px 0;animation:pop .5s}
.fb{margin:14px 0;padding:13px 15px;border-radius:10px;font-size:14px;background:var(--panel2);border:1px solid var(--line);animation:slideIn .3s}
.fb.good{border-left:4px solid var(--good)}.fb.bad{border-left:4px solid var(--bad)}.fb.mid{border-left:4px solid var(--warn)}
.fb .mh{font-weight:700;font-size:12px;margin-bottom:4px}
.q2{font-weight:600;margin:14px 0 8px}
.lab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:12px}
.lab-tile{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;transition:.18s;position:relative}
.lab-tile:hover{border-color:var(--purple);transform:translateY(-3px)}
.lab-tile.done{border-color:var(--good)}
.lab-tile .ic{font-size:26px}
.lab-tile .tt{font-weight:700;margin-top:4px;font-size:14px}
.lab-tile .dd{font-size:12px;color:var(--muted);margin-top:5px}
.lab-tile .lv{font-size:11px;color:var(--purple);margin-top:7px;font-weight:700}
.lab-tile.done .lv{color:var(--good)}
/* arch review */
.archsvg{width:100%;max-width:640px;display:block;margin:14px auto}
.node{cursor:pointer;transition:.15s}
.node:hover .nbox{stroke:#fff;stroke-width:2}
.node.found .nbox{stroke:var(--bad);stroke-width:3;fill:#fdeaea}
.node.safe .nbox{stroke:var(--good);stroke-width:2}
.flawlist{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.flawitem{padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:13px;opacity:.4}
.flawitem.got{opacity:1;border-color:var(--bad);background:var(--nobg)}
/* policy/checkbox labs */
.checkrow{display:flex;align-items:flex-start;gap:10px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:11px 13px;margin:7px 0;cursor:pointer;transition:.15s;font-size:14px}
.checkrow:hover{border-color:var(--accent)}
.checkrow.sel{border-color:var(--accent);background:var(--accbg)}
.checkrow .cb{width:20px;height:20px;border:2px solid var(--line);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.checkrow.sel .cb{background:var(--accent);border-color:var(--accent);color:var(--ink)}
.checkrow.right{border-color:var(--good)!important;background:var(--okbg)!important}
.checkrow.wrong{border-color:var(--bad)!important;background:var(--nobg)!important}
.fwk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin:10px 0}
.fwk{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;cursor:pointer;font-size:13px;transition:.15s;text-align:center}
.fwk:hover{border-color:var(--accent)} .fwk.sel{border-color:var(--accent);background:var(--accbg)}
.fwk.right{border-color:var(--good);background:var(--okbg)} .fwk.wrong{border-color:var(--bad);background:var(--nobg)}
/* ===== landing / login ===== */
.landing{min-height:calc(100vh - 52px);display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 20px;position:relative;overflow:hidden}
.landing::before{content:"";position:absolute;inset:-50%;background:
  radial-gradient(circle at 30% 30%,rgba(37,99,168,.12),transparent 40%),
  radial-gradient(circle at 70% 60%,rgba(124,92,214,.12),transparent 40%);
  animation:spin 24s linear infinite;z-index:0}
@keyframes spin{to{transform:rotate(360deg)}}
.landing>*{position:relative;z-index:1}
.bigshield{font-size:90px;animation:floaty 3.5s ease-in-out infinite;filter:drop-shadow(0 8px 24px rgba(37,99,168,.28))}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.landing h1{font-size:44px;margin:10px 0 6px;background:linear-gradient(90deg,#2563a8,#7c5cd6);-webkit-background-clip:text;background-clip:text;color:transparent}
.landing .lead{font-size:17px;color:var(--muted);max-width:560px;margin:0 auto 8px}
.land-stats{display:flex;gap:26px;justify-content:center;margin:20px 0;flex-wrap:wrap}
.land-stats .ls b{font-size:26px;color:var(--accent);display:block}
.land-stats .ls span{font-size:12px;color:var(--muted)}
.loginbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;margin-top:14px;width:340px;max-width:90vw;box-shadow:var(--shadow-lg)}
.loginbox input{width:100%;background:var(--inputbg);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:12px;font-size:15px;text-align:center;margin-bottom:12px}
.bigbtn{background:linear-gradient(90deg,#2563a8,#3f6fc0);color:var(--ink);border:none;border-radius:10px;padding:13px 22px;font-size:16px;font-weight:800;cursor:pointer;width:100%;transition:.15s}
.bigbtn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.feature-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:26px;max-width:760px}
.feature{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;width:170px;text-align:left;box-shadow:var(--shadow)}
.feature .fi{font-size:24px}.feature .ft{font-weight:700;font-size:13px;margin-top:4px}.feature .fd{font-size:11px;color:var(--muted)}
.userchip{display:flex;align-items:center;gap:8px;font-size:13px}
.userchip .av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#2563a8,#7c5cd6);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--ink)}
.logout{background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:7px;padding:4px 9px;font-size:11px;cursor:pointer}
/* ===== dashboard ===== */
.dash-top{display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.ringwrap{position:relative;width:150px;height:150px;flex-shrink:0}
.ringwrap .rt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringwrap .rt b{font-size:30px}.ringwrap .rt span{font-size:11px;color:var(--muted)}
.ring-bg{fill:none;stroke:var(--track);stroke-width:12}
.ring-fg{fill:none;stroke:url(#rg);stroke-width:12;stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;
  transition:stroke-dashoffset 1.1s cubic-bezier(.3,1,.4,1)}
.dash-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;flex:1;min-width:240px}
.stat-card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow)}
.stat-card b{font-size:24px;display:block} .stat-card span{font-size:11px;color:var(--muted)}
.pbar{height:9px;background:var(--track);border-radius:5px;overflow:hidden;margin-top:6px}
.pbar>i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,#3fb950,#79e08c);transition:width 1s cubic-bezier(.3,1,.4,1)}
.dash-path{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
.dash-path:hover .dpn{color:var(--accent)}
.dash-path .dpi{font-size:20px}.dash-path .dpn{flex:1;font-weight:600;font-size:14px}
.dash-path .dpp{width:130px}.dash-path .dpx{font-size:12px;color:var(--muted);width:46px;text-align:right}
.continue{background:linear-gradient(135deg,#e8f1fb,#f0eafb);border:1px solid var(--accent);border-radius:14px;padding:18px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:var(--shadow)}
.continue .ci{font-size:34px}
/* ===== roadmaps ===== */
.rmap{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.rmap h3{margin:0 0 2px;font-size:18px}.rmap .rsub{color:var(--muted);font-size:13px;margin-bottom:12px}
.timeline{position:relative;padding-left:30px}
.timeline::before{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--line)}
.milestone{position:relative;padding:9px 0;cursor:pointer}
.milestone::before{content:"";position:absolute;left:-25px;top:13px;width:14px;height:14px;border-radius:50%;background:var(--panel2);border:2px solid var(--line);transition:.2s}
.milestone.done::before{background:var(--good);border-color:var(--good);box-shadow:0 0 10px rgba(63,185,80,.6)}
.milestone:hover .mt{color:var(--accent)}
.milestone .mt{font-weight:600;font-size:14px}.milestone .md{font-size:12px;color:var(--muted)}
.milestone .mtag{font-size:10px;padding:1px 7px;border-radius:8px;background:var(--chip);color:var(--muted);margin-left:6px}
.milestone.done .mtag{background:var(--okbg);color:var(--good)}
.track-pick{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.track-btn{flex:1;min-width:160px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;cursor:pointer;text-align:center;transition:.15s;box-shadow:var(--shadow)}
.track-btn:hover{transform:translateY(-3px)}
.track-btn.gr{border-color:var(--good)} .track-btn.cl{border-color:var(--accent)} .track-btn.ai{border-color:var(--purple)}
.track-btn .ti{font-size:28px}.track-btn .tt{font-weight:700;margin-top:4px}.track-btn .tp{font-size:11px;color:var(--muted);margin-top:3px}

<script>
/* ===========================================================================
   GovernAI Lab — GRC & AI Governance, zero → senior manager.
   TryHackMe-style ROOMS (read + answer questions) + interactive LABS.
   100% rules engine. No AI/LLM. Answers validated against hardcoded keys.
   =========================================================================== */

const METERS=[
  {key:"risk",label:"AI Risk",start:35,invert:true},
  {key:"compliance",label:"Compliance",start:50,invert:false},
  {key:"trust",label:"Board Trust",start:60,invert:false},
  {key:"rep",label:"Reputation",start:70,invert:false},
];
const RANKS=[
  {xp:0,name:"Intern"},{xp:150,name:"GRC Analyst"},{xp:350,name:"Senior Analyst"},
  {xp:600,name:"Compliance/Risk Manager"},{xp:850,name:"GRC Lead"},{xp:1100,name:"Senior Manager, GRC"},
];

/* ===================== INTERACTIVE LABS (widgets) ===================== */
const LAB_META={
  registry:{ic:"🔍",title:"LAB: Shadow AI Discovery",desc:"Scan the office, find shadow AI, classify each into the registry."},
  risk:{ic:"📊",title:"LAB: Risk Assessment Matrix",desc:"Drive a live likelihood×impact heatmap and assign a tier."},
  mapping:{ic:"🧩",title:"LAB: Control Mapping",desc:"Drag controls onto the four NIST AI RMF functions."},
  bias:{ic:"⚖️",title:"LAB: Bias Detection",desc:"Read a fairness chart, spot disparate impact, decide."},
  incident:{ic:"🚨",title:"LAB: Incident Response",desc:"Beat a live data-leak timer with the right action order."},
  arch:{ic:"🏗️",title:"LAB: Architecture Review",desc:"Click the cloud diagram to find every security flaw."},
  policy:{ic:"📜",title:"LAB: Policy Builder",desc:"Assemble an enforceable policy; reject the filler clauses."},
  register:{ic:"📋",title:"LAB: Risk Register",desc:"Score inherent risk, apply controls, pick the treatment."},
  evidence:{ic:"🗃️",title:"LAB: Audit Evidence",desc:"Give the auditor the right objective evidence each time."},
  crosswalk:{ic:"🔗",title:"LAB: Cross-Framework Crosswalk",desc:"Map one control to every framework it satisfies."},
  capstone:{ic:"🎓",title:"LAB: Capstone — Full GRC Lifecycle",desc:"Run a fintech end-to-end: inventory → risk → policy → audit → board."},
};

/* ===================== ROOMS (content) — filled by ROOMS.push below ===================== */
const PATHS=[
  {id:"p1",name:"Path 1 · GRC Foundations",desc:"What GRC is, why it exists, and the core machinery: governance, risk, controls. Start here."},
  {id:"p6",name:"Path 2 · Security & Technical Foundations",desc:"The security knowledge a senior GRC pro needs to assess controls: CIA, IAM, SecOps, cloud, continuity."},
  {id:"p2",name:"Path 3 · Frameworks & Standards",desc:"The major frameworks — what each is, why organisations adopt it, and when it applies."},
  {id:"p3",name:"Path 4 · Audit & Compliance Operations",desc:"How the work actually gets done: audits, evidence, policies, vendor risk."},
  {id:"p4",name:"Path 5 · AI Governance",desc:"Governing AI: new risks, registries, EU AI Act, NIST AI RMF, ISO 42001, bias, incidents."},
  {id:"p5",name:"Path 6 · Leadership & Interview Mastery",desc:"Risk appetite, board reporting, building a program, and senior-manager interview prep."},
  {id:"p7",name:"Path 7 · Assessment Challenges",desc:"Mixed scenario exams that test applied judgment across everything — your readiness check before the projects."},
  {id:"p8",name:"Path 8 · Implementation Playbooks",desc:"The senior-manager 'how to build it' track — implement, certify, operate and maintain real ISMS, SOC 2, privacy, GRC-ops and AI-governance programs."},
  {id:"lib-privacy",name:"📚 Library · Privacy & Data-Protection Laws",desc:"The world's privacy regimes — GDPR, CCPA/CPRA, LGPD, India DPDPA, Vietnam PDPL, ISO 27701. Each backed by an installed Claude skill."},
  {id:"lib-security",name:"📚 Library · Security & InfoSec Frameworks",desc:"ISO 27001, NIST CSF, NIST 800-53, CIS Controls, SOC 2, CMMC — the core security control frameworks."},
  {id:"lib-ai",name:"📚 Library · AI Governance Frameworks",desc:"ISO 42001, NIST AI RMF, EU AI Act — the standards and law governing AI."},
  {id:"lib-sector",name:"📚 Library · Financial & Sector Regulations",desc:"PCI DSS, HIPAA, DORA, SWIFT CSP, TSA — rules for payments, health, finance and critical transport."},
  {id:"lib-infra",name:"📚 Library · Cloud, Product & Critical-Infra",desc:"FedRAMP, NIS2, EU CRA — authorising cloud, securing products and critical infrastructure."},
  {id:"lib-national",name:"📚 Library · National InfoSec Manuals",desc:"Australia ISM and New Zealand NZISM — government security manuals."},
  {id:"lib-export",name:"📚 Library · Export Control",desc:"ITAR and EAR — controlling defense and dual-use technology exports."},
  {id:"lib-esg",name:"📚 Library · Accessibility & Sustainability",desc:"Section 508, WCAG, CSRD — accessible ICT and sustainability reporting."},
];
const ROOMS=[];

ROOMS.push(
/* ============================== PATH 1 ============================== */
{
 id:"grc-intro", path:"p1", ic:"🧭", diff:"easy", title:"What is GRC & Why It Exists",
 sub:"The problem GRC solves, and the language of the field.",
 tasks:[
  {title:"The problem GRC solves",
   info:`<p>Every organisation must chase its objectives <b>while</b> obeying laws, surviving
   threats, and keeping the trust of customers, regulators and investors. Do this badly and
   you get fines, breaches, scandals, and lost business.</p>
   <p><b>Governance, Risk & Compliance (GRC)</b> is the integrated discipline that keeps those
   three forces aligned so the business can pursue its goals <em>reliably</em>, address
   <em>uncertainty</em>, and act with <em>integrity</em>.</p>
   <h4>Why "integrated"? (the real reason GRC exists)</h4>
   <p>Before GRC, security, legal, risk and audit worked in <b>silos</b>. Result: the same
   control got tested five times by five teams, gaps fell between the cracks, and leadership
   had no single view of risk. GRC exists to remove that duplication and those blind spots —
   one language, one risk picture, one set of controls serving many obligations.</p>
   <div class="callout why"><b>Need it answers:</b> coordination. Without it, effort is wasted,
   risks are missed, and no one can answer the board's question: "are we actually safe and compliant?"</div>`,
   qs:[
    {q:"What do the letters G-R-C stand for? (comma separated)",a:["governance, risk, and compliance","governance risk and compliance","governance, risk and compliance","governance, risk, compliance"],
     explain:"Governance, Risk, and Compliance — three forces kept aligned as one discipline."},
    {q:"In one word: the main thing GRC adds by working across silos instead of within them.",a:["coordination","integration","alignment"],
     explain:"Integration/coordination — removing duplicated effort and closing the gaps between siloed teams."},
   ]},
  {title:"Governance vs Management (who decides what)",
   info:`<p>People confuse these constantly. Get it crisp:</p>
   <table><tr><th>Governance</th><th>Management</th></tr>
   <tr><td>Sets <b>direction</b> & provides <b>oversight</b></td><td><b>Executes</b> within that direction</td></tr>
   <tr><td>The <b>board</b> / executives</td><td>Operational teams & managers</td></tr>
   <tr><td>Sets objectives, <b>risk appetite</b>, accountability, policy</td><td>Runs processes, applies controls, reports up</td></tr></table>
   <p>The board does not run the firewall. It decides <b>how much risk the firm is willing to
   accept</b> (risk appetite) and holds management accountable for staying within it.</p>
   <h4>The policy hierarchy (governance's output)</h4>
   <ul><li><b>Policy</b> — high-level "what & why" (mandatory, board/exec approved)</li>
   <li><b>Standard</b> — specific mandatory rules (e.g. "passwords ≥ 14 chars")</li>
   <li><b>Procedure</b> — step-by-step "how"</li>
   <li><b>Guideline</b> — recommended, not mandatory</li></ul>`,
   qs:[
    {q:"Who owns setting the organisation's RISK APPETITE — governance/board, or operational management?",a:["governance","board","governance/board","the board"],
     explain:"Governance (the board/executives) sets risk appetite; management executes within it."},
    {q:"In the policy hierarchy, the step-by-step 'how to do it' document is called a ___",a:["procedure"],
     explain:"Policy (what/why) → Standard (specific rules) → Procedure (how) → Guideline (recommended)."},
   ]},
  {title:"Why GRC is booming now",
   info:`<p>GRC isn't new, but demand exploded. The <b>drivers</b> (causes) you should be able
   to name in an interview:</p>
   <ul><li><b>Regulatory explosion</b> — GDPR, SOX, HIPAA, DORA, the EU AI Act… non-compliance
   now carries fines in the millions or % of global revenue.</li>
   <li><b>Digital & cyber risk</b> — everything is online; one breach is existential.</li>
   <li><b>Third-party/supply-chain risk</b> — you inherit your vendors' weaknesses.</li>
   <li><b>Stakeholder trust</b> — customers and investors demand provable security & ethics.</li>
   <li><b>AI</b> — a brand-new, fast-moving risk surface (Path 4).</li></ul>
   <div class="callout"><b>Interview framing:</b> GRC is not a cost centre. It's what lets a
   business move <em>fast</em> safely and <em>prove</em> it — turning trust into a competitive advantage.</div>`,
   qs:[
    {q:"True/False: GRC should be framed to executives as a pure cost centre that slows the business.",a:["false"],
     explain:"False. Frame it as an enabler — it lets the business move fast safely and prove trust to win deals."},
   ]},
 ]},
{
 id:"three-lines", path:"p1", ic:"🛡️", diff:"easy", title:"The Three Lines Model",
 sub:"How accountability for risk is structured across an organisation.",
 tasks:[
  {title:"The three lines of defence",
   info:`<p>The <b>Three Lines Model</b> (IIA) explains <em>who is responsible for risk</em>, so
   it never falls through the cracks. This is bread-and-butter interview material.</p>
   <table><tr><th>Line</th><th>Who</th><th>Role</th></tr>
   <tr><td><b>1st line</b></td><td>Operational management / process owners</td><td><b>Owns and manages</b> risk day-to-day; runs the controls</td></tr>
   <tr><td><b>2nd line</b></td><td>Risk & compliance functions</td><td><b>Oversees</b>, sets policy & frameworks, monitors & challenges the 1st line</td></tr>
   <tr><td><b>3rd line</b></td><td>Internal audit</td><td><b>Independent assurance</b> — checks 1st & 2nd lines actually work; reports to the board/audit committee</td></tr></table>
   <h4>Why independence matters</h4>
   <p>Internal audit must be independent of what it audits — otherwise it's marking its own
   homework. That's why the 3rd line reports to the <b>audit committee</b>, not to the managers
   it reviews.</p>
   <div class="callout why"><b>Need it answers:</b> clear ownership. Risk isn't "the security
   team's job" — the 1st line owns it, the 2nd line oversees, the 3rd line independently assures.</div>`,
   qs:[
    {q:"Which line of defence is INTERNAL AUDIT? (give the number)",a:["3","third","3rd","three"],
     explain:"Third line — independent assurance, reporting to the audit committee, not to management."},
    {q:"Which line OWNS and manages risk day-to-day and operates the controls? (number)",a:["1","first","1st","one"],
     explain:"First line — operational management/process owners own the risk and run the controls."},
    {q:"Risk & compliance functions that set policy and challenge the first line are the ___ line. (number)",a:["2","second","2nd","two"],
     explain:"Second line — oversight, frameworks, monitoring and challenge."},
   ]},
 ]},
{
 id:"risk-fundamentals", path:"p1", ic:"🎲", diff:"easy", title:"Risk Management Fundamentals",
 sub:"The vocabulary and method of risk — then prove it on the live matrix.",
 tasks:[
  {title:"What risk actually is",
   info:`<p>ISO 31000 defines <b>risk</b> as the <em>effect of uncertainty on objectives</em>.
   Note: effect can be negative <b>or</b> positive — but in GRC we mostly manage downside.</p>
   <h4>The two numbers</h4>
   <p>Risk is assessed as <b>Likelihood × Impact</b>. A near-certain tiny annoyance and a
   freak catastrophe can score the same — which is why both axes matter.</p>
   <h4>Inherent vs residual</h4>
   <ul><li><b>Inherent risk</b> — the risk <em>before</em> any controls.</li>
   <li><b>Residual risk</b> — what <em>remains after</em> controls are applied. This is what you
   actually live with and report.</li></ul>
   <h4>Risk appetite vs tolerance</h4>
   <p><b>Appetite</b> = how much risk you're willing to take to pursue goals (set by governance).
   <b>Tolerance</b> = the acceptable variation around it. Residual risk above appetite must be treated or formally accepted.</p>`,
   qs:[
    {q:"The risk that REMAINS after controls are applied is called ___ risk.",a:["residual"],
     explain:"Residual risk = what's left after controls. Inherent risk is before controls."},
    {q:"Risk is commonly scored as Likelihood × ___",a:["impact","consequence","severity"],
     explain:"Likelihood × Impact — both axes matter."},
   ]},
  {title:"The four risk treatments",
   info:`<p>Once a risk is assessed, you choose a <b>treatment</b> (a.k.a. the 4 T's):</p>
   <table><tr><th>Treatment</th><th>Meaning</th><th>Example</th></tr>
   <tr><td><b>Avoid</b> (Terminate)</td><td>Stop the activity causing the risk</td><td>Don't launch the risky product</td></tr>
   <tr><td><b>Reduce</b> (Treat)</td><td>Apply controls to lower likelihood/impact</td><td>Add MFA, encryption</td></tr>
   <tr><td><b>Transfer</b></td><td>Shift the risk to a third party</td><td>Cyber insurance, outsourcing</td></tr>
   <tr><td><b>Accept</b> (Tolerate)</td><td>Knowingly live with it (within appetite)</td><td>Sign-off a low residual risk</td></tr></table>
   <h4>The risk register</h4>
   <p>All this lives in a <b>risk register</b>: each risk with owner, inherent score, controls,
   residual score, treatment, and status. It's the single source of truth risk managers live in.</p>
   <div class="callout why"><b>Cause to remember:</b> insurance does NOT reduce the chance of a
   breach — it <em>transfers</em> the financial impact. Don't confuse transfer with reduce.</div>`,
   qs:[
    {q:"Buying cyber insurance is which risk treatment?",a:["transfer","transfer risk"],
     explain:"Transfer — you shift the financial impact to the insurer; likelihood is unchanged."},
    {q:"Knowingly choosing to live with a low risk (within appetite) is which treatment?",a:["accept","tolerate","acceptance"],
     explain:"Accept/Tolerate — formally signed off when residual risk is within appetite."},
    {q:"The single document listing each risk with its owner, scores, controls and treatment is the risk ___",a:["register"],
     explain:"The risk register — the risk manager's source of truth."},
   ]},
  {title:"🧪 Hands-on: score a real risk",
   info:`<p>Now do it. The lab below gives you a real scenario — drive the likelihood and
   impact sliders, watch the live 5×5 heatmap, and assign the correct tier. Launch it:</p>
   <p><button class="btn" onclick="openLab('risk')">▶ Launch Risk Matrix Lab</button></p>
   <p class="muted">Complete the lab to bank its points; then come back and finish this room.</p>`,
   qs:[
    {q:"After running the lab: a system whose errors affect people's livelihoods and acts on everyone scores HIGH on which axis especially — likelihood or impact?",a:["impact","both"],
     explain:"Impact is high (livelihoods affected); for an automated ranker likelihood is high too. High×High = top-tier risk."},
   ]},
 ]},
{
 id:"controls-101", path:"p1", ic:"⚙️", diff:"easy", title:"Controls 101",
 sub:"The mechanisms that actually reduce risk — and how auditors test them.",
 tasks:[
  {title:"Control types by function",
   info:`<p>A <b>control</b> is any measure that reduces risk. Classify by <em>when</em> they act:</p>
   <table><tr><th>Type</th><th>Acts…</th><th>Example</th></tr>
   <tr><td><b>Preventive</b></td><td>Before — stops it happening</td><td>MFA, firewall, access approval</td></tr>
   <tr><td><b>Detective</b></td><td>During/after — finds it</td><td>Log monitoring, IDS, audits</td></tr>
   <tr><td><b>Corrective</b></td><td>After — fixes/limits damage</td><td>Backups/restore, incident response, CAPA</td></tr></table>
   <p>And by <em>nature</em>: <b>Administrative</b> (policies, training), <b>Technical</b>
   (software/hardware), <b>Physical</b> (locks, guards). Good programs use <b>defence in depth</b>
   — layered controls so one failure isn't fatal.</p>`,
   qs:[
    {q:"A firewall that blocks bad traffic before it arrives is which control type?",a:["preventive","preventative"],
     explain:"Preventive — it acts before the event to stop it."},
    {q:"Reviewing system logs to spot an intrusion that already happened is which type?",a:["detective"],
     explain:"Detective — it identifies an event during or after it occurs."},
    {q:"Restoring from backup after ransomware is which control type?",a:["corrective"],
     explain:"Corrective — it limits/repairs damage after the event."},
   ]},
  {title:"Design vs operating effectiveness",
   info:`<p>Auditors ask two different questions about every control — memorise this distinction,
   it's a classic interview trap:</p>
   <ul><li><b>Design effectiveness</b> — is the control <em>designed</em> properly to address the
   risk? (Would it work if performed as intended?)</li>
   <li><b>Operating effectiveness</b> — is it <em>actually being performed</em> consistently over
   time? (Did it work, every time, for the whole period?)</li></ul>
   <p>A control can be well-designed but fail operationally (e.g. access reviews are required but
   nobody did them for 6 months). <b>SOC 2 Type I</b> tests design at a point in time;
   <b>Type II</b> tests operating effectiveness over a period (you'll meet this in Path 2).</p>
   <div class="callout why"><b>Cause:</b> this is why "we have a policy for that" is never enough —
   evidence must show the control <em>operated</em>, not just that it exists on paper.</div>`,
   qs:[
    {q:"Testing whether a control actually ran consistently over a period tests its ___ effectiveness.",a:["operating","operational"],
     explain:"Operating effectiveness — performed consistently over time (vs design = built correctly)."},
    {q:"Which SOC 2 report type covers operating effectiveness over a period — Type I or Type II?",a:["type ii","ii","2","type 2","type two"],
     explain:"Type II = operating effectiveness over a window. Type I = design at a point in time."},
   ]},
 ]},
);

/* ============================== PATH 2 ============================== */
ROOMS.push(
{
 id:"iso27001", path:"p2", ic:"📘", diff:"med", title:"ISO/IEC 27001 — the ISMS Standard",
 sub:"The world's leading information-security certification: what, why, how.",
 tasks:[
  {title:"What ISO 27001 is and why firms adopt it",
   info:`<p><b>ISO/IEC 27001</b> is the international standard for an <b>Information Security
   Management System (ISMS)</b> — a systematic, risk-based way to manage the security of
   information. It is <b>certifiable</b>: an accredited body audits you and issues a certificate.</p>
   <h4>Why organisations adopt it (the drivers)</h4>
   <ul><li><b>Win business</b> — enterprise customers demand it in contracts/tenders.</li>
   <li><b>Trust signal</b> — a globally recognised badge that you manage security properly.</li>
   <li><b>Structure</b> — a proven blueprint instead of ad-hoc security.</li>
   <li><b>Risk-based</b> — you secure what matters, justified by risk, not box-ticking.</li></ul>
   <h4>How it's built</h4>
   <p>The core is a <b>risk-driven management system</b>: define scope → assess risks → select
   controls to treat them → document the <b>Statement of Applicability (SoA)</b> (which controls
   apply and why) → operate, monitor, improve (the Plan-Do-Check-Act cycle).</p>`,
   qs:[
    {q:"ISO 27001 certifies that you run an information security management system — abbreviated ___",a:["isms"],
     explain:"ISMS — Information Security Management System."},
    {q:"The document stating which Annex A controls you apply (and justifying any exclusions) is the Statement of ___",a:["applicability","applicability (soa)","soa"],
     explain:"Statement of Applicability (SoA) — the cornerstone document of an ISO 27001 ISMS."},
   ]},
  {title:"Annex A controls & certification",
   info:`<p>ISO 27001's <b>Annex A</b> lists the control catalogue (the 2022 version has
   <b>93 controls</b> grouped into <b>4 themes</b>: Organisational, People, Physical,
   Technological). You pick the ones your risk assessment justifies — recorded in the SoA.</p>
   <p>Note: <b>ISO 27002</b> is the companion that explains <em>how</em> to implement those
   controls; you certify against <b>27001</b>, you implement guided by 27002.</p>
   <h4>The certification audit</h4>
   <ul><li><b>Stage 1</b> — documentation review (is your ISMS designed right?).</li>
   <li><b>Stage 2</b> — evidence audit (is it actually operating?).</li>
   <li>Then <b>surveillance audits</b> yearly, full <b>recertification</b> every 3 years.</li></ul>
   <div class="callout why"><b>Why risk-based, not a fixed checklist?</b> Because a hospital and a
   game studio face different threats. ISO makes you justify controls against <em>your</em> risks
   — that's the whole philosophy.</div>`,
   qs:[
    {q:"Which ISO standard gives implementation GUIDANCE for the controls (the companion to 27001)?",a:["iso 27002","27002","iso/iec 27002"],
     explain:"ISO 27002 — guidance on implementing the Annex A controls. You certify against 27001."},
    {q:"Roughly how many Annex A controls are in the 2022 version? (number)",a:["93"],
     explain:"93 controls across 4 themes: Organisational, People, Physical, Technological."},
   ]},
 ]},
{
 id:"nist-csf", path:"p2", ic:"🏛️", diff:"med", title:"NIST Cybersecurity Framework (CSF)",
 sub:"A flexible common language for managing cyber risk.",
 tasks:[
  {title:"The functions and why CSF exists",
   info:`<p>The <b>NIST CSF</b> is a <b>voluntary</b>, flexible framework (US gov origin, used
   worldwide) that gives organisations a <b>common language</b> to assess and improve cyber risk.
   Unlike ISO 27001 it's <b>not certifiable</b> — it's a self-assessment / improvement tool.</p>
   <h4>The Functions</h4>
   <p>Originally five; <b>CSF 2.0 (2024)</b> added <b>Govern</b>, making six:</p>
   <ul><li><b>Govern</b> (new in 2.0) — strategy, roles, policy, oversight</li>
   <li><b>Identify</b> — know your assets, risks, context</li>
   <li><b>Protect</b> — safeguards to limit impact</li>
   <li><b>Detect</b> — spot events</li>
   <li><b>Respond</b> — act on incidents</li>
   <li><b>Recover</b> — restore after incidents</li></ul>
   <div class="callout why"><b>Why a "common language"?</b> So the SOC analyst, the CISO and the
   board can all describe maturity the same way and compare against peers. It maps cleanly to ISO,
   SOC 2, etc.</div>`,
   qs:[
    {q:"Which NIST CSF function covers RESTORING capabilities after an incident?",a:["recover"],
     explain:"Recover — restoration of services/data after an incident."},
    {q:"CSF 2.0 (2024) added which new function focused on strategy, roles and oversight?",a:["govern"],
     explain:"Govern — added in 2.0 to wrap strategy/oversight around the other five functions."},
    {q:"Is NIST CSF a certifiable standard like ISO 27001? (yes/no)",a:["no"],
     explain:"No — CSF is a voluntary self-assessment/improvement framework, not a certification."},
   ]},
 ]},
{
 id:"soc2", path:"p2", ic:"🧾", diff:"med", title:"SOC 2",
 sub:"How SaaS companies prove their controls to customers.",
 tasks:[
  {title:"Trust Services Criteria & report types",
   info:`<p><b>SOC 2</b> (from the AICPA) is an <b>attestation report</b> — produced by a
   <b>CPA/audit firm</b> — that proves a service organisation's controls are suitably designed
   and operating. It's the de-facto trust document SaaS vendors hand to customers. It is a
   <b>report</b>, not a certification.</p>
   <h4>The five Trust Services Criteria (TSC)</h4>
   <ul><li><b>Security</b> — the only <em>mandatory</em> one (a.k.a. the Common Criteria)</li>
   <li><b>Availability</b> — system uptime/resilience</li>
   <li><b>Processing Integrity</b> — processing is complete, accurate, timely</li>
   <li><b>Confidentiality</b> — protecting confidential data</li>
   <li><b>Privacy</b> — handling of personal information</li></ul>
   <h4>Type I vs Type II</h4>
   <table><tr><th>Type I</th><th>Type II</th></tr>
   <tr><td>Controls' <b>design</b> at a <b>point in time</b></td><td><b>Operating effectiveness</b> over a <b>period</b> (e.g. 6–12 months)</td></tr>
   <tr><td>Quicker, weaker assurance</td><td>What enterprise customers really want</td></tr></table>
   <div class="callout why"><b>Why customers demand it:</b> they're outsourcing data to you, so
   your risk becomes theirs (third-party risk). A SOC 2 Type II lets them trust you without
   auditing you themselves.</div>`,
   qs:[
    {q:"Which TSC category is ALWAYS required in every SOC 2?",a:["security","security (common criteria)","common criteria"],
     explain:"Security (the Common Criteria) is mandatory; the other four are optional add-ons."},
    {q:"Which SOC 2 type proves operating effectiveness over a period of months — Type I or II?",a:["type ii","ii","2","type 2","type two"],
     explain:"Type II covers a period; Type I is design at a single point in time."},
    {q:"Who issues a SOC 2 report — a CPA/audit firm, or ISO?",a:["cpa","cpa/audit firm","audit firm","a cpa firm","cpa firm"],
     explain:"A licensed CPA firm performs the SOC 2 attestation (it's an AICPA standard)."},
   ]},
 ]},
{
 id:"gdpr", path:"p2", ic:"🔐", diff:"med", title:"GDPR & Data Privacy",
 sub:"Europe's privacy law — and the model the world copies.",
 tasks:[
  {title:"Why GDPR exists and its principles",
   info:`<p>The <b>General Data Protection Regulation (GDPR)</b> protects the personal data of
   people in the EU/EEA. It applies to any organisation worldwide that handles such data
   (extra-territorial reach), which is why it became a global baseline.</p>
   <h4>Key principles</h4>
   <ul><li><b>Lawfulness, fairness, transparency</b></li>
   <li><b>Purpose limitation</b> — use data only for the stated purpose</li>
   <li><b>Data minimisation</b> — collect only what's necessary</li>
   <li><b>Accuracy</b>, <b>Storage limitation</b>, <b>Integrity & confidentiality</b></li>
   <li><b>Accountability</b> — you must be able to <em>prove</em> compliance</li></ul>
   <h4>Roles</h4>
   <p><b>Controller</b> decides why/how data is processed; <b>Processor</b> processes on the
   controller's behalf; a <b>DPO</b> (Data Protection Officer) oversees compliance where required.</p>`,
   qs:[
    {q:"The principle 'collect only the personal data you actually need' is called data ___",a:["minimisation","minimization"],
     explain:"Data minimisation — a core GDPR principle that also shrinks breach impact."},
    {q:"The party that DECIDES the purpose and means of processing personal data is the ___",a:["controller","data controller"],
     explain:"Controller decides why/how; the processor acts on the controller's instructions."},
   ]},
  {title:"Rights, DPIAs, breaches and fines",
   info:`<p><b>Data-subject rights</b> include access, rectification, erasure ("right to be
   forgotten"), restriction, portability, and objection.</p>
   <h4>DPIA</h4>
   <p>A <b>Data Protection Impact Assessment</b> is required before <b>high-risk</b> processing
   (e.g. large-scale profiling, sensitive data, systematic monitoring). It documents the data,
   purpose, lawful basis, risks to individuals, and mitigations — <em>before</em> you build.</p>
   <h4>Breaches & fines</h4>
   <ul><li>Personal-data breach → notify the supervisory authority within <b>72 hours</b> where it
   risks people's rights; notify affected individuals if high risk.</li>
   <li>Max fines: up to <b>€20 million or 4% of global annual turnover</b>, whichever is higher.</li></ul>
   <div class="callout why"><b>Cause:</b> the 72-hour clock and the % -of-revenue fine are <em>why</em>
   privacy gets board attention — the downside is existential, not a slap on the wrist.</div>`,
   qs:[
    {q:"Within how many HOURS must a notifiable personal-data breach be reported to the regulator?",a:["72","72 hours"],
     explain:"72 hours from awareness, where the breach risks individuals' rights and freedoms."},
    {q:"The mandatory assessment before high-risk processing is abbreviated ___",a:["dpia"],
     explain:"DPIA — Data Protection Impact Assessment, done before building."},
    {q:"GDPR's top fine tier is up to what percent of global annual turnover? (number)",a:["4","4%"],
     explain:"Up to €20M or 4% of global annual turnover — whichever is higher."},
   ]},
 ]},
{
 id:"mapping-room", path:"p2", ic:"🧩", diff:"med", title:"Control Mapping & Crosswalks",
 sub:"One control, many frameworks — work once, comply many times.",
 tasks:[
  {title:"Why mapping exists",
   info:`<p>Organisations rarely face one framework. A SaaS firm might need SOC 2 <b>and</b>
   ISO 27001 <b>and</b> GDPR <b>and</b> ISO 42001. Treated separately that's four audits, four
   evidence pulls, huge duplication.</p>
   <p><b>Control mapping (crosswalking)</b> connects a single control to the multiple framework
   requirements it satisfies. Build a <b>common control framework</b> once; one piece of
   evidence (e.g. an access-review log) then answers SOC 2 CC6, ISO 27001 A.5.18, and more.</p>
   <div class="callout why"><b>Need it answers:</b> efficiency + coverage. Map once → prove many,
   and instantly see which requirements have <em>no</em> control behind them (the gaps).</div>
   <h4>🧪 Hands-on</h4>
   <p>Practise mapping controls to the NIST AI RMF functions:</p>
   <p><button class="btn" onclick="openLab('mapping')">▶ Launch Control Mapping Lab</button></p>`,
   qs:[
    {q:"Connecting one control to the many framework requirements it satisfies is called control ___",a:["mapping","crosswalking","crosswalk"],
     explain:"Mapping / crosswalking — build a common control set once, satisfy many frameworks."},
    {q:"A big benefit of mapping is spotting requirements with no control behind them — i.e. the ___",a:["gaps","gap","control gaps"],
     explain:"Gaps — mapping exposes uncovered requirements as well as saving duplicated effort."},
   ]},
 ]},
);

ROOMS.push(
{
 id:"audit-evidence", path:"p3", ic:"🔎", diff:"med", title:"Audits, Evidence & Findings",
 sub:"How audits actually run — and why 'we do that' is never enough.",
 tasks:[
  {title:"How an audit works",
   info:`<p>An <b>audit</b> is an independent check that controls exist and operate. Two flavours:</p>
   <ul><li><b>Internal audit</b> — the 3rd line, gives the board assurance (and finds issues before
   outsiders do).</li><li><b>External audit</b> — independent firm, for certification (ISO) or
   attestation (SOC 2) that customers/regulators trust.</li></ul>
   <h4>The lifecycle</h4>
   <ol><li><b>Planning / scoping</b> — what's in scope, which controls, what period.</li>
   <li><b>Fieldwork</b> — gather and test <b>evidence</b>.</li>
   <li><b>Reporting</b> — document findings & severity.</li>
   <li><b>Follow-up</b> — verify fixes (CAPA) closed.</li></ol>
   <div class="callout why"><b>Why independence?</b> An auditor can't review their own work — that's
   marking your own homework. Independence is what makes the assurance credible.</div>`,
   qs:[
    {q:"The independent in-house function (third line) that assures the board is ___ audit.",a:["internal"],
     explain:"Internal audit = the 3rd line, independent assurance to the board/audit committee."},
    {q:"The first phase of an audit, defining what's in scope and the period, is called ___",a:["planning","scoping","planning/scoping","planning and scoping"],
     explain:"Planning/scoping — defines scope, controls and the period under review."},
   ]},
  {title:"Evidence, findings and CAPA",
   info:`<p>Auditors test controls by demanding <b>objective evidence</b> — a record that exists
   <em>independent of your word</em>: dated logs, signed approvals, tickets, screenshots, configs.
   "We always do that" is not evidence.</p>
   <h4>Findings</h4>
   <p>Where a control is missing or failed, the auditor raises a <b>finding</b> (a.k.a.
   non-conformity), rated by severity (e.g. <b>major</b> vs <b>minor</b>). A major can block
   certification.</p>
   <h4>CAPA</h4>
   <p>You respond with a <b>Corrective And Preventive Action</b> plan: root-cause the issue, fix it,
   add a control/test so it can't recur, with an <b>owner</b> and <b>due date</b>. Auditors respect
   a working CAPA process more than a suspicious "zero findings".</p>
   <div class="callout why"><b>Cause:</b> never falsify or backdate evidence. A finding is survivable;
   fabricated evidence is fraud — career-ending and often illegal.</div>`,
   qs:[
    {q:"A record that exists independently of your word (logs, signed approvals) is called ___ evidence.",a:["objective"],
     explain:"Objective evidence — dated, owned, verifiable; the only thing auditors accept."},
    {q:"The plan to root-cause, fix and prevent recurrence of a finding is abbreviated ___",a:["capa"],
     explain:"CAPA — Corrective And Preventive Action, with an owner and due date."},
    {q:"A serious non-conformity that can block certification is a ___ finding.",a:["major","critical"],
     explain:"Major (critical) finding — can stop certification until corrected."},
   ]},
 ]},
{
 id:"policies", path:"p3", ic:"📜", diff:"easy", title:"Policies, Standards & Procedures",
 sub:"The document hierarchy that turns intent into enforceable rules.",
 tasks:[
  {title:"The hierarchy and what makes a policy real",
   info:`<p>Governance speaks through documents, in a strict hierarchy (revisited from Path 1, now
   deeper):</p>
   <table><tr><th>Doc</th><th>Answers</th><th>Mandatory?</th></tr>
   <tr><td><b>Policy</b></td><td>What & why (high-level intent)</td><td>Yes</td></tr>
   <tr><td><b>Standard</b></td><td>Specific mandatory rules/specs</td><td>Yes</td></tr>
   <tr><td><b>Procedure</b></td><td>Step-by-step how</td><td>Yes</td></tr>
   <tr><td><b>Guideline</b></td><td>Recommended best practice</td><td>No</td></tr></table>
   <h4>What makes a policy enforceable</h4>
   <p>A good policy has: <b>scope</b>, <b>named owner</b>, specific <b>required/forbidden actions</b>
   (testable controls), a <b>review date</b>, and a defined <b>exception process</b>. Vague
   aspiration ("use AI responsibly") is "policy theatre" — an auditor can't test it, so it's a finding.</p>
   <div class="callout why"><b>Cause:</b> exceptions must be <em>documented and approved</em> — an
   undocumented workaround is an uncontrolled risk and the first thing audits expose.</div>`,
   qs:[
    {q:"Which document is RECOMMENDED rather than mandatory — policy, standard, procedure, or guideline?",a:["guideline"],
     explain:"Guideline = recommended best practice; the other three are mandatory."},
    {q:"A policy that says 'be responsible' with no testable rule or owner is dismissed as policy ___",a:["theatre","theater"],
     explain:"Policy theatre — looks good, can't be tested or enforced, becomes an audit finding."},
   ]},
 ]},
{
 id:"vendor-risk-room", path:"p3", ic:"🔗", diff:"med", title:"Third-Party / Vendor Risk",
 sub:"You inherit your vendors' weaknesses — so you must govern them.",
 tasks:[
  {title:"Why third-party risk is its own discipline",
   info:`<p>Modern firms run on vendors — cloud, SaaS, payroll, AI APIs. Each one is a door into
   your data and operations. <b>You inherit their risk</b> but don't control their systems, so a
   vendor breach becomes <em>your</em> incident and <em>your</em> regulatory liability.</p>
   <h4>The due-diligence toolkit</h4>
   <ul><li><b>Security questionnaires</b> (e.g. SIG, CAIQ) before onboarding.</li>
   <li><b>Reliance on their reports</b> — review their <b>SOC 2 Type II</b> / ISO 27001 instead of
   auditing them yourself.</li>
   <li><b>Contracts</b> — a <b>DPA</b> (data-processing agreement): purpose limits, breach-notice
   timelines, deletion rights, sub-processor transparency, and (AI era) <em>no training on our data
   without consent</em>.</li>
   <li><b>Tiering</b> — assess deeper for vendors touching sensitive data / critical processes.</li>
   <li><b>Continuous monitoring</b> — risk isn't one-and-done at signing.</li></ul>
   <div class="callout why"><b>Concentration risk:</b> if one cloud provider runs everything, its
   outage is your outage. Spreading or planning for that is part of vendor governance.</div>`,
   qs:[
    {q:"Rather than auditing a vendor yourself, you typically rely on their ___ Type II report.",a:["soc 2","soc2","soc"],
     explain:"SOC 2 Type II — independent proof their controls operate over time."},
    {q:"The contract clause governing how a processor handles your personal data is the ___ (abbrev).",a:["dpa"],
     explain:"DPA — Data Processing Agreement; your enforcement hook over the vendor."},
    {q:"Over-relying on a single provider for everything creates ___ risk.",a:["concentration"],
     explain:"Concentration risk — one vendor's failure cascades to your whole operation."},
   ]},
 ]},
);

{
 id:"ai-why", path:"p4", ic:"🤖", diff:"med", title:"Why AI Governance Exists",
 sub:"The new risks that traditional GRC doesn't cover.",
 tasks:[
  {title:"What's different about AI risk",
   info:`<p>Traditional IT governs deterministic software: same input → same output. AI is
   <b>probabilistic, data-driven and adaptive</b>, creating risks classic GRC never had to handle:</p>
   <ul><li><b>Bias / discrimination</b> — models learn and amplify patterns in data (Path 4 bias lab).</li>
   <li><b>Opacity ("black box")</b> — you can't always explain <em>why</em> it decided.</li>
   <li><b>Hallucination</b> — generative AI states false things confidently.</li>
   <li><b>Drift</b> — performance silently degrades as the world changes.</li>
   <li><b>Autonomy</b> — agents take <em>actions</em>, not just give answers, at machine speed.</li>
   <li><b>Data & IP</b> — training data rights, privacy, and leakage.</li></ul>
   <div class="callout why"><b>Need it answers:</b> these risks are dynamic and emergent, so AI
   governance must be <em>continuous and contextual</em> — not a one-time checklist. That's exactly
   why platforms like Credo AI and standards like ISO 42001 emerged.</div>`,
   qs:[
    {q:"When a model's performance silently degrades over time as the world changes, that's called ___",a:["drift","model drift","data drift"],
     explain:"Drift — why AI needs continuous monitoring, not point-in-time sign-off."},
    {q:"When generative AI confidently states something false, that's a ___",a:["hallucination"],
     explain:"Hallucination — a core generative-AI risk requiring human oversight."},
    {q:"The inability to explain WHY an AI made a decision is the ___ box problem.",a:["black"],
     explain:"Black-box / opacity problem — drives the need for explainability controls."},
   ]},
 ]},
{
 id:"ai-registry-room", path:"p4", ic:"📒", diff:"med", title:"AI Inventory & Shadow AI",
 sub:"Step one of AI governance: know every AI system you run.",
 tasks:[
  {title:"The AI Registry",
   info:`<p>You cannot govern what you cannot see. The <b>AI Registry</b> is the central catalogue of
   every AI system — built, bought, or unsanctioned. For each: <b>owner, purpose, data used, vendor,
   risk class, status</b>. It is always the first deliverable of an AI governance program.</p>
   <h4>Shadow AI</h4>
   <p><b>Shadow AI</b> = AI tools staff use without approval (e.g. pasting customer data into a public
   chatbot). It's the biggest blind spot — invisible, ungoverned, and often leaking data. Discovery
   makes it visible; you catalogue first, judge later.</p>
   <h4>🧪 Hands-on</h4>
   <p>Run the discovery sweep, find the shadow AI, and classify each system:</p>
   <p><button class="btn" onclick="openLab('registry')">▶ Launch Shadow AI Discovery Lab</button></p>`,
   qs:[
    {q:"Unsanctioned AI tools staff use without approval are collectively called ___ AI.",a:["shadow"],
     explain:"Shadow AI — the top blind spot; discovery + registry make it governable."},
    {q:"The first deliverable of an AI governance program — the central catalogue of all AI — is the AI ___",a:["registry","inventory"],
     explain:"AI Registry/Inventory — you can't govern what you can't see."},
   ]},
 ]},
{
 id:"ai-eu-act", path:"p4", ic:"⚖️", diff:"hard", title:"AI Risk & the EU AI Act",
 sub:"The world's first comprehensive AI law — and its risk tiers.",
 tasks:[
  {title:"The risk-based tiers",
   info:`<p>The <b>EU AI Act</b> regulates AI by <b>risk tier</b> — the more potential harm, the more
   obligations:</p>
   <table><tr><th>Tier</th><th>Examples</th><th>Treatment</th></tr>
   <tr><td><b>Unacceptable</b></td><td>Social scoring, manipulative AI</td><td><b>Banned</b></td></tr>
   <tr><td><b>High</b></td><td>Hiring, credit, biometrics, critical infra, medical</td><td>Heavy controls: risk mgmt, data governance, human oversight, transparency, logging</td></tr>
   <tr><td><b>Limited</b></td><td>Chatbots, deepfakes</td><td>Transparency (disclose it's AI)</td></tr>
   <tr><td><b>Minimal</b></td><td>Spam filters, game AI</td><td>Few/no obligations</td></tr></table>
   <p>Penalties are GDPR-scale (up to a % of global turnover). Like GDPR, it has <b>extra-territorial</b>
   reach — affects anyone serving the EU market.</p>
   <h4>🧪 Hands-on</h4>
   <p><button class="btn" onclick="openLab('risk')">▶ Launch Risk Matrix Lab</button></p>`,
   qs:[
    {q:"Under the EU AI Act, AI used for hiring/recruitment falls into which risk tier?",a:["high","high-risk","high risk"],
     explain:"High-risk — employment decisions affect rights/livelihoods, triggering the heaviest controls."},
    {q:"AI used for government social scoring is in which tier (it's banned)?",a:["unacceptable","unacceptable risk"],
     explain:"Unacceptable risk — prohibited outright under the EU AI Act."},
    {q:"A chatbot must simply disclose it's AI — that's which tier?",a:["limited","limited risk"],
     explain:"Limited risk — transparency obligations only."},
   ]},
 ]},
{
 id:"ai-frameworks", path:"p4", ic:"🧱", diff:"hard", title:"NIST AI RMF & ISO 42001",
 sub:"The two frameworks that operationalise AI governance.",
 tasks:[
  {title:"NIST AI RMF and ISO 42001",
   info:`<p><b>NIST AI RMF</b> (Risk Management Framework) is a voluntary US framework with four
   functions — the AI cousin of the cyber CSF:</p>
   <ul><li><b>Govern</b> — culture, policy, accountability (cuts across all)</li>
   <li><b>Map</b> — context & risk identification</li>
   <li><b>Measure</b> — test, assess, quantify (e.g. bias testing lives here)</li>
   <li><b>Manage</b> — prioritise & respond to risks</li></ul>
   <p><b>ISO/IEC 42001</b> is the world's first <b>certifiable AI Management System (AIMS)</b> standard
   — the AI analogue of ISO 27001. It lets an organisation get <em>audited and certified</em> for how
   it governs AI, which is becoming a market trust signal.</p>
   <div class="callout why"><b>Why two?</b> NIST RMF = flexible self-improvement & common language;
   ISO 42001 = certifiable proof. Many firms use RMF to build, then certify against 42001. Map controls
   to a framework to prove coverage and expose gaps.</div>
   <h4>🧪 Hands-on</h4>
   <p><button class="btn" onclick="openLab('mapping')">▶ Launch Control Mapping Lab</button></p>`,
   qs:[
    {q:"Name the four NIST AI RMF functions' odd-one-in: Govern, Map, Measure, and ___",a:["manage"],
     explain:"Govern, Map, Measure, Manage — the four AI RMF functions."},
    {q:"The certifiable AI Management System standard (the ISO 27001 of AI) is ISO/IEC ___",a:["42001","iso 42001","iso/iec 42001"],
     explain:"ISO 42001 — first certifiable AI management system standard."},
    {q:"Bias/fairness testing maps to which NIST AI RMF function?",a:["measure"],
     explain:"Measure — analyse, test, quantify AI risks."},
   ]},
 ]},
{
 id:"ai-bias-room", path:"p4", ic:"🎯", diff:"hard", title:"Bias, Fairness & Explainability",
 sub:"Read fairness results and make the call — accuracy isn't enough.",
 tasks:[
  {title:"Why accuracy hides harm",
   info:`<p>A model can be highly accurate <em>overall</em> yet deeply unfair to a subgroup —
   aggregate metrics mask subgroup harm. If equally-qualified groups get very different outcomes,
   that's <b>disparate impact</b>: a legal and ethical failure that accuracy does not excuse.</p>
   <h4>Where bias hides</h4>
   <ul><li><b>Proxy features</b> — a variable correlated with a protected attribute (e.g. postcode ≈ race).</li>
   <li><b>Skewed training data</b> — history of biased decisions, baked in.</li></ul>
   <p>The fix is never a disclaimer — it's <b>root-cause → mitigate → re-test fairness → document</b>.
   <b>Explainability</b> (being able to justify a decision) is the partner control that makes high-risk
   AI defensible.</p>
   <h4>🧪 Hands-on</h4>
   <p><button class="btn" onclick="openLab('bias')">▶ Launch Bias Detection Lab</button></p>`,
   qs:[
    {q:"A large outcome gap between equally-qualified protected groups is called disparate ___",a:["impact"],
     explain:"Disparate impact — unfair outcomes regardless of intent; accuracy doesn't excuse it."},
    {q:"A feature that secretly stands in for a protected attribute (e.g. postcode for race) is a ___ feature.",a:["proxy"],
     explain:"Proxy feature — a common hiding place for bias."},
   ]},
 ]},
{
 id:"ai-incident-room", path:"p4", ic:"🚨", diff:"hard", title:"AI Incident & Lifecycle Governance",
 sub:"When live AI causes harm — contain, notify, fix, in the right order.",
 tasks:[
  {title:"Runtime governance and incident order",
   info:`<p>Models drift and agents misbehave <em>live</em>, so governance doesn't stop at deployment —
   it runs at <b>runtime</b> (monitoring, guardrails, human-in-the-loop). When an AI incident hits, the
   order is fixed:</p>
   <p class="mono"><b>Contain → Assess → Notify → Root-cause → Fix (CAPA)</b></p>
   <ul><li><b>Contain</b> first — take it offline; every second of live harm compounds.</li>
   <li><b>Notify</b> — if personal data is exposed, the GDPR <b>72-hour</b> clock may apply (loop the DPO).</li>
   <li><b>Fix</b> — RCA, then a CAPA with a new control + test so the failure class can't recur.</li></ul>
   <h4>Agentic AI</h4>
   <p>Agents that take actions (move money, send email) need <b>action limits + human approval above a
   threshold + full audit logs</b>. Multi-agent systems add network-level risk: cascading errors and
   prompt-injection passing between agents.</p>
   <h4>🧪 Hands-on</h4>
   <p><button class="btn" onclick="openLab('incident')">▶ Launch Incident Response Lab</button></p>`,
   qs:[
    {q:"What is the FIRST action in any AI incident — contain, notify, or root-cause?",a:["contain","containment"],
     explain:"Contain first — stop ongoing harm before anything else."},
    {q:"Governance that monitors and constrains AI while it's live in production is ___ governance.",a:["runtime"],
     explain:"Runtime governance — continuous oversight after deployment (drift, guardrails, human-in-loop)."},
   ]},
 ]},
);

ROOMS.push(
{
 id:"risk-appetite-reporting", path:"p5", ic:"📈", diff:"hard", title:"Risk Appetite & Board Reporting",
 sub:"Turn governance into decisions executives can act on.",
 tasks:[
  {title:"Speaking to the board",
   info:`<p>At senior level, GRC becomes <b>strategy</b>. Boards govern by <b>exception and decision</b> —
   they don't want 47 control IDs; they want: <em>where's our risk, is it within appetite, and what
   decision do you need from us?</em></p>
   <h4>Risk appetite in practice</h4>
   <p>Lead with the few risks <b>outside appetite</b>, state business exposure in plain language, and
   make a clear <b>ask</b>. Frame choices as appetite trade-offs: here's the value, the residual risk,
   and control options at each speed — <em>your</em> call on appetite. Governance <b>enables</b> the
   business; it doesn't just block.</p>
   <h4>Useful artifacts</h4>
   <ul><li><b>Risk heat map</b> — top risks on a likelihood×impact grid.</li>
   <li><b>KRIs</b> (Key Risk Indicators) — early-warning metrics.</li>
   <li><b>RAG status</b> — Red/Amber/Green dashboards executives parse fast.</li></ul>
   <div class="callout why"><b>Cause:</b> dumping detail or giving false comfort both destroy
   credibility. The seat senior GRC earns is owning the trade-off conversation honestly.</div>`,
   qs:[
    {q:"Early-warning metrics that signal rising risk are abbreviated ___",a:["kris","kri","key risk indicators"],
     explain:"KRIs — Key Risk Indicators; the dashboard early-warning lights."},
    {q:"Boards primarily govern by exception and ___ (what do they need from you?).",a:["decision","decisions"],
     explain:"Decision — surface what's outside appetite and the decision you need, not raw detail."},
   ]},
 ]},
{
 id:"build-program", path:"p5", ic:"🏗️", diff:"hard", title:"Building & Maturing a GRC Program",
 sub:"From spreadsheets to a continuous, integrated program.",
 tasks:[
  {title:"Maturity and how programs grow",
   info:`<p>Senior managers don't just run controls — they <b>build the program</b>. Maturity models
   (like CMMI) describe the journey:</p>
   <table><tr><th>Level</th><th>State</th></tr>
   <tr><td>1 Initial</td><td>Ad-hoc, heroics, spreadsheets</td></tr>
   <tr><td>2 Repeatable</td><td>Basic processes exist</td></tr>
   <tr><td>3 Defined</td><td>Documented, standardised across the org</td></tr>
   <tr><td>4 Managed</td><td>Measured with metrics/KRIs</td></tr>
   <tr><td>5 Optimising</td><td>Continuous improvement, automated</td></tr></table>
   <h4>How to build one</h4>
   <ol><li>Establish <b>governance</b> (charter, roles, risk appetite).</li>
   <li>Build the <b>risk register</b> and a <b>common control framework</b> (map once, comply many).</li>
   <li>Operationalise: policies, evidence, audits, monitoring.</li>
   <li>Report up; iterate. Tooling/automation replaces spreadsheets as you scale.</li></ol>
   <div class="callout why"><b>Why maturity matters in interviews:</b> "where is this program and how
   do I move it up a level?" is exactly the strategic thinking a senior-manager hire is tested on.</div>`,
   qs:[
    {q:"At the lowest maturity level, a program is ad-hoc and reliant on heroics — this level is called ___",a:["initial","1","level 1","ad-hoc","ad hoc"],
     explain:"Initial (Level 1) — ad-hoc, undocumented, spreadsheet-driven."},
    {q:"Building one control set that satisfies many frameworks is a ___ control framework.",a:["common","unified"],
     explain:"Common (unified) control framework — map once, comply many; the efficiency backbone."},
   ]},
 ]},
{
 id:"interview-prep", path:"p5", ic:"🎓", diff:"hard", title:"Senior Manager Interview Mastery",
 sub:"Scenario questions a 10-year GRC leader must nail.",
 tasks:[
  {title:"Behavioural & strategic answers",
   info:`<p>Senior GRC interviews test <b>judgment</b> and <b>communication</b>, not memorised
   definitions. Use the <b>STAR</b> method (Situation, Task, Action, Result) for behavioural questions,
   and always tie governance back to <b>business value</b>.</p>
   <h4>Common questions & what they're really testing</h4>
   <ul><li><i>"The CEO wants to ship a high-risk AI tool with no controls by Friday."</i> → Do you have
   the spine to block with a plan, not just say no? (judgment + diplomacy)</li>
   <li><i>"How would you mature our program?"</i> → maturity model thinking (previous room).</li>
   <li><i>"Explain GDPR to a sceptical sales team."</i> → can you translate, not lecture?</li>
   <li><i>"Tell me about a time you disagreed with leadership."</i> → STAR + influence without authority.</li></ul>
   <div class="callout why"><b>Golden thread:</b> always frame GRC as an <em>enabler</em> of safe,
   fast business — and prove decisions with evidence and risk appetite, never opinion.</div>`,
   qs:[
    {q:"The structured format for answering behavioural questions (Situation, Task, Action, Result) is ___",a:["star","star method"],
     explain:"STAR — Situation, Task, Action, Result; structures crisp behavioural answers."},
    {q:"CEO demands sign-off on a high-risk AI with no bias testing by Friday. Best senior move: block-with-a-plan, approve-to-please, or refuse-flatly?",
     options:["Approve it to keep the CEO happy","Block go-live but offer a concrete 2-week control plan","Flatly refuse and escalate to the board immediately"],
     a:["Block go-live but offer a concrete 2-week control plan"],
     explain:"Block WITH a plan — protects the business and your credibility while still enabling delivery. Pure approval ships the scandal; flat refusal makes governance the enemy."},
    {q:"In one phrase, GRC should always be framed to the business as an ___ (not a blocker).",a:["enabler","business enabler"],
     explain:"Enabler — safe speed + provable trust = competitive advantage. The golden thread of senior GRC."},
   ]},
 ]},
);
